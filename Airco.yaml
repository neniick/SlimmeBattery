blueprint:
  name: "Slimme Airco Besturing (Per-Kamer UIT Schakelaars)"
  description: "Volledige controle met opties om airco's expliciet UIT te zetten per tijdslot."
  domain: automation
  input:
    # --- AANWEZIGHEID & APPARATEN ---
    telefoons:
      name: "Telefoons van Bewoners (WiFi)"
      selector: { entity: { domain: device_tracker, multiple: true } }
    afwezigheid_minuten:
      name: "Vertraging bij Vertrek (Minuten)"
      default: 15
      selector: { number: { min: 0, max: 60, step: 1, unit_of_measurement: min } }
    buiten_sensor:
      name: "Buitentemperatuur Sensor"
      default: sensor.temperatuur
      selector: { entity: { domain: sensor, device_class: temperature } }

    # --- INSTELLINGEN WOONKAMER ---
    airco_woonkamer:
      name: "Airco Woonkamer"
      selector: { entity: { domain: climate } }
    wk_tijd_dag:
      name: "Woonkamer - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    wk_tijd_nacht:
      name: "Woonkamer - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    wk_uit_thuis:
      name: "[UIT] Woonkamer - Zet UIT tijdens Dag (Thuis)"
      default: false
      selector: { boolean: {} }
    wk_temp_home:
      name: "Woonkamer - Temp Thuis (Dag)"
      default: 21
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_uit_weg:
      name: "[UIT] Woonkamer - Zet UIT tijdens Weg"
      default: false
      selector: { boolean: {} }
    wk_temp_away:
      name: "Woonkamer - Temp Weg"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_uit_nacht:
      name: "[UIT] Woonkamer - Zet UIT in de Nacht"
      default: false
      selector: { boolean: {} }
    wk_temp_night:
      name: "Woonkamer - Temp Nacht"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- INSTELLINGEN KEUKEN ---
    airco_keuken:
      name: "Airco Keuken"
      selector: { entity: { domain: climate } }
    kk_tijd_dag:
      name: "Keuken - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    kk_tijd_nacht:
      name: "Keuken - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    kk_uit_thuis:
      name: "[UIT] Keuken - Zet UIT tijdens Dag (Thuis)"
      default: false
      selector: { boolean: {} }
    kk_temp_home:
      name: "Keuken - Temp Thuis (Dag)"
      default: 21
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_uit_weg:
      name: "[UIT] Keuken - Zet UIT tijdens Weg"
      default: false
      selector: { boolean: {} }
    kk_temp_away:
      name: "Keuken - Temp Weg"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_uit_nacht:
      name: "[UIT] Keuken - Zet UIT in de Nacht"
      default: false
      selector: { boolean: {} }
    kk_temp_night:
      name: "Keuken - Temp Nacht"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- INSTELLINGEN BOVEN ---
    airco_boven:
      name: "Airco Boven"
      selector: { entity: { domain: climate } }
    bv_tijd_dag:
      name: "Boven - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    bv_tijd_pre_bed:
      name: "Boven - Start Pre-Bed"
      default: "22:00:00"
      selector: { time: {} }
    bv_tijd_nacht:
      name: "Boven - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    bv_uit_thuis:
      name: "[UIT] Boven - Zet UIT tijdens Dag (Thuis)"
      default: false
      selector: { boolean: {} }
    bv_temp_home:
      name: "Boven - Temp Thuis (Dag)"
      default: 19
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_uit_pre_bed:
      name: "[UIT] Boven - Zet UIT tijdens Pre-Bed"
      default: false
      selector: { boolean: {} }
    bv_temp_pre_bed:
      name: "Boven - Temp Pre-Bed"
      default: 21
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_uit_weg:
      name: "[UIT] Boven - Zet UIT tijdens Weg"
      default: false
      selector: { boolean: {} }
    bv_temp_away:
      name: "Boven - Temp Weg"
      default: 16
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_uit_nacht:
      name: "[UIT] Boven - Zet UIT in de Nacht"
      default: true
      selector: { boolean: {} }
    bv_temp_night:
      name: "Boven - Temp Nacht"
      default: 16
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- THERMISCHE BATTERIJ ---
    accu_sensor:
      name: "Thuisaccu SOC Sensor (%)"
      default: sensor.accu_omvormer_battery_soc
      selector: { entity: { domain: sensor } }
    accu_drempel:
      name: "Accu Vol Drempel (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 1, unit_of_measurement: "%" } }
    accu_boost:
      name: "Accu Boost (Graden)"
      default: 1.0
      selector: { number: { min: 0.0, max: 3.0, step: 0.5, unit_of_measurement: °C } }

    # --- GLOBALE WEER & MARGE INSTELLINGEN ---
    buiten_temp_verwarmen:
      name: "Verwarmen als het buiten kouder is dan:"
      default: 18
      selector: { number: { min: 10, max: 30, step: 0.5, unit_of_measurement: °C } }
    buiten_temp_koelen:
      name: "Koelen als het buiten warmer is dan:"
      default: 22
      selector: { number: { min: 10, max: 30, step: 0.5, unit_of_measurement: °C } }
    marge_boven:
      name: "Marge Boven Doel"
      default: 1.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }
    marge_onder:
      name: "Marge Onder Doel"
      default: 1.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }

mode: single

trigger:
  - platform: time
    at: !input wk_tijd_dag
  - platform: time
    at: !input wk_tijd_nacht
  - platform: time
    at: !input kk_tijd_dag
  - platform: time
    at: !input kk_tijd_nacht
  - platform: time
    at: !input bv_tijd_dag
  - platform: time
    at: !input bv_tijd_pre_bed
  - platform: time
    at: !input bv_tijd_nacht
  - platform: state
    entity_id: 
      - !input airco_woonkamer
      - !input airco_keuken
      - !input airco_boven
    attribute: current_temperature
  - platform: state
    entity_id: !input telefoons
    to: 'not_home'
    for:
      minutes: !input afwezigheid_minuten
  - platform: state
    entity_id: !input telefoons
    to: 'home'
  - platform: numeric_state
    entity_id: !input accu_sensor
    above: !input accu_drempel
  - platform: numeric_state
    entity_id: !input accu_sensor
    below: !input accu_drempel

action:
  - variables:
      # Weer en Marges
      buiten_sensor_var: !input buiten_sensor
      omslag_koud: !input buiten_temp_verwarmen
      omslag_warm: !input buiten_temp_koelen
      telefoons_var: !input telefoons
      accu_sensor_var: !input accu_sensor
      accu_drempel_var: !input accu_drempel
      accu_boost_var: !input accu_boost
      marge_b: !input marge_boven
      marge_o: !input marge_onder
      
      # Woonkamer Inputs
      airco_wk_var: !input airco_woonkamer
      wk_t_dag: !input wk_tijd_dag
      wk_t_nacht: !input wk_tijd_nacht
      wk_h: !input wk_temp_home
      wk_a: !input wk_temp_away
      wk_n: !input wk_temp_night
      wk_u_h: !input wk_uit_thuis
      wk_u_a: !input wk_uit_weg
      wk_u_n: !input wk_uit_nacht
      
      # Keuken Inputs
      airco_kk_var: !input airco_keuken
      kk_t_dag: !input kk_tijd_dag
      kk_t_nacht: !input kk_tijd_nacht
      kk_h: !input kk_temp_home
      kk_a: !input kk_temp_away
      kk_n: !input kk_temp_night
      kk_u_h: !input kk_uit_thuis
      kk_u_a: !input kk_uit_weg
      kk_u_n: !input kk_uit_nacht
      
      # Boven Inputs
      airco_bv_var: !input airco_boven
      bv_t_dag: !input bv_tijd_dag
      bv_t_pre: !input bv_tijd_pre_bed
      bv_t_nacht: !input bv_tijd_nacht
      bv_h: !input bv_temp_home
      bv_p: !input bv_temp_pre_bed
      bv_a: !input bv_temp_away
      bv_n: !input bv_temp_night
      bv_u_h: !input bv_uit_thuis
      bv_u_p: !input bv_uit_pre_bed
      bv_u_a: !input bv_uit_weg
      bv_u_n: !input bv_uit_nacht
      
      iemand_thuis: >
        {{ expand(telefoons_var) | selectattr('state', 'eq', 'home') | list | length > 0 }}

      is_dag_wk: >
        {% set start = today_at(wk_t_dag) %}
        {% set end = today_at(wk_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_dag_kk: >
        {% set start = today_at(kk_t_dag) %}
        {% set end = today_at(kk_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_dag_bv: >
        {% set start = today_at(bv_t_dag) %}
        {% set end = today_at(bv_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_pre_bed_bv: >
        {% set start = today_at(bv_t_pre) %}
        {% set end = today_at(bv_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
      
      buiten_temp: "{{ states(buiten_sensor_var) | float(20) }}"
      gekozen_modus: >
        {% if buiten_temp <= omslag_koud %} heat
        {% elif buiten_temp >= omslag_warm %} cool
        {% else %} off {% endif %}

      actuele_soc: "{{ states(accu_sensor_var) | float(0) }}"
      boost_wk: "{% if actuele_soc >= accu_drempel_var and iemand_thuis and is_dag_wk %} {{ accu_boost_var }} {% else %} 0 {% endif %}"
      boost_kk: "{% if actuele_soc >= accu_drempel_var and iemand_thuis and is_dag_kk %} {{ accu_boost_var }} {% else %} 0 {% endif %}"
      boost_bv: "{% if actuele_soc >= accu_drempel_var and iemand_thuis and is_dag_bv %} {{ accu_boost_var }} {% else %} 0 {% endif %}"
        
      # Doelen bepalen: Als 'UIT' is geselecteerd, geef dan de tekst 'off' door. Anders bereken doel incl. boost.
      doel_wk_basis: >
        {% if not iemand_thuis %} {{ 'off' if wk_u_a else wk_a }}
        {% elif not is_dag_wk %} {{ 'off' if wk_u_n else wk_n }}
        {% else %} {{ 'off' if wk_u_h else wk_h }} {% endif %}
      doel_wk: >
        {% if doel_wk_basis == 'off' %} off
        {% elif gekozen_modus == 'heat' %} {{ doel_wk_basis | float(20) + boost_wk | float(0) }}
        {% elif gekozen_modus == 'cool' %} {{ doel_wk_basis | float(20) - boost_wk | float(0) }}
        {% else %} {{ doel_wk_basis | float(20) }} {% endif %}
        
      doel_kk_basis: >
        {% if not iemand_thuis %} {{ 'off' if kk_u_a else kk_a }}
        {% elif not is_dag_kk %} {{ 'off' if kk_u_n else kk_n }}
        {% else %} {{ 'off' if kk_u_h else kk_h }} {% endif %}
      doel_kk: >
        {% if doel_kk_basis == 'off' %} off
        {% elif gekozen_modus == 'heat' %} {{ doel_kk_basis | float(20) + boost_kk | float(0) }}
        {% elif gekozen_modus == 'cool' %} {{ doel_kk_basis | float(20) - boost_kk | float(0) }}
        {% else %} {{ doel_kk_basis | float(20) }} {% endif %}
        
      doel_bv_basis: >
        {% if not iemand_thuis %} {{ 'off' if bv_u_a else bv_a }}
        {% elif is_pre_bed_bv %} {{ 'off' if bv_u_p else bv_p }}
        {% elif not is_dag_bv %} {{ 'off' if bv_u_n else bv_n }}
        {% else %} {{ 'off' if bv_u_h else bv_h }} {% endif %}
      doel_bv: >
        {% if doel_bv_basis == 'off' %} off
        {% elif gekozen_modus == 'heat' %} {{ doel_bv_basis | float(20) + boost_bv | float(0) }}
        {% elif gekozen_modus == 'cool' %} {{ doel_bv_basis | float(20) - boost_bv | float(0) }}
        {% else %} {{ doel_bv_basis | float(20) }} {% endif %}

      # Actuele temperatuur (met fallback naar 20 graden als sensordata mist)
      huidig_wk: "{{ state_attr(airco_wk_var, 'current_temperature') | float(20) }}"
      huidig_kk: "{{ state_attr(airco_kk_var, 'current_temperature') | float(20) }}"
      huidig_bv: "{{ state_attr(airco_bv_var, 'current_temperature') | float(20) }}"

  - choose:
      # --- ALLES UIT (DODE ZONE) ---
      - conditions:
          - condition: template
            value_template: "{{ gekozen_modus == 'off' }}"
        sequence:
          - service: climate.set_hvac_mode
            target:
              entity_id: 
                - !input airco_woonkamer
                - !input airco_keuken
                - !input airco_boven
            data:
              hvac_mode: "off"
              
    default:
      # --- BEOORDELING WOONKAMER ---
      - choose:
          # Als doel is 'off', zet direct uit en negeer temperaturen.
          - conditions:
              - condition: template
                value_template: "{{ doel_wk == 'off' }}"
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_woonkamer
                data:
                  hvac_mode: "off"
          # Marge Uitschakelen
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_wk >= (doel_wk | float(20) + marge_b | float(1)) }}
                  {% else %}
                    {{ huidig_wk <= (doel_wk | float(20) - marge_o | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_woonkamer
                data:
                  hvac_mode: "off"
          # Inschakelen / Temperatuur sturen
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_wk <= (doel_wk | float(20) - marge_o | float(1)) }}
                  {% else %}
                    {{ huidig_wk >= (doel_wk | float(20) + marge_b | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_woonkamer
                data:
                  temperature: "{{ doel_wk }}"
                  hvac_mode: "{{ gekozen_modus }}"

      # --- BEOORDELING KEUKEN ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ doel_kk == 'off' }}"
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_keuken
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_kk >= (doel_kk | float(20) + marge_b | float(1)) }}
                  {% else %}
                    {{ huidig_kk <= (doel_kk | float(20) - marge_o | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_keuken
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_kk <= (doel_kk | float(20) - marge_o | float(1)) }}
                  {% else %}
                    {{ huidig_kk >= (doel_kk | float(20) + marge_b | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_keuken
                data:
                  temperature: "{{ doel_kk }}"
                  hvac_mode: "{{ gekozen_modus }}"

      # --- BEOORDELING BOVEN ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ doel_bv == 'off' }}"
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_boven
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_bv >= (doel_bv | float(20) + marge_b | float(1)) }}
                  {% else %}
                    {{ huidig_bv <= (doel_bv | float(20) - marge_o | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_boven
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_bv <= (doel_bv | float(20) - marge_o | float(1)) }}
                  {% else %}
                    {{ huidig_bv >= (doel_bv | float(20) + marge_b | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_boven
                data:
                  temperature: "{{ doel_bv }}"
                  hvac_mode: "{{ gekozen_modus }}"
blueprint:
  name: "Slimme Airco Besturing (Per-Kamer Tijden, Pre-Bed & Accu)"
  description: "Onafhankelijke schema's per airco, een pre-bed boost voor de slaapkamer, accu-integratie en aanwezigheidsdetectie."
  domain: automation
  input:
    # --- AANWEZIGHEID & APPARATEN ---
    telefoons:
      name: "Telefoons van Bewoners (WiFi)"
      selector: { entity: { domain: device_tracker, multiple: true } }
    afwezigheid_minuten:
      name: "Vertraging bij Vertrek (Minuten)"
      default: 15
      selector: { number: { min: 0, max: 60, step: 1, unit_of_measurement: min } }
    buiten_sensor:
      name: "Buitentemperatuur Sensor"
      default: sensor.temperatuur
      selector: { entity: { domain: sensor, device_class: temperature } }

    # --- INSTELLINGEN WOONKAMER ---
    airco_woonkamer:
      name: "Airco Woonkamer"
      selector: { entity: { domain: climate } }
    wk_tijd_dag:
      name: "Woonkamer - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    wk_tijd_nacht:
      name: "Woonkamer - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    wk_temp_home:
      name: "Woonkamer - Temp Thuis (Dag)"
      default: 21
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_temp_away:
      name: "Woonkamer - Temp Weg"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_temp_night:
      name: "Woonkamer - Temp Nacht"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- INSTELLINGEN KEUKEN ---
    airco_keuken:
      name: "Airco Keuken"
      selector: { entity: { domain: climate } }
    kk_tijd_dag:
      name: "Keuken - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    kk_tijd_nacht:
      name: "Keuken - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    kk_temp_home:
      name: "Keuken - Temp Thuis (Dag)"
      default: 21
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_temp_away:
      name: "Keuken - Temp Weg"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_temp_night:
      name: "Keuken - Temp Nacht"
      default: 18
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- INSTELLINGEN BOVEN ---
    airco_boven:
      name: "Airco Boven"
      selector: { entity: { domain: climate } }
    bv_tijd_dag:
      name: "Boven - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    bv_tijd_pre_bed:
      name: "Boven - Start Pre-Bed (Tijdelijk Verwarmen/Koelen)"
      description: "De tijd waarop de slaapkamer alvast op een aangenamere temperatuur wordt gebracht."
      default: "22:00:00"
      selector: { time: {} }
    bv_tijd_nacht:
      name: "Boven - Start Nacht (Slapen)"
      default: "23:00:00"
      selector: { time: {} }
    bv_temp_home:
      name: "Boven - Temp Thuis (Dag)"
      default: 19
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_temp_pre_bed:
      name: "Boven - Temp Pre-Bed"
      default: 21
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_temp_away:
      name: "Boven - Temp Weg"
      default: 16
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_temp_night:
      name: "Boven - Temp Nacht"
      default: 16
      selector: { number: { min: 15, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- THERMISCHE BATTERIJ ---
    accu_sensor:
      name: "Thuisaccu SOC Sensor (%)"
      default: sensor.accu_omvormer_battery_soc
      selector: { entity: { domain: sensor } }
    accu_drempel:
      name: "Accu Vol Drempel (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 1, unit_of_measurement: "%" } }
    accu_boost:
      name: "Accu Boost (Graden)"
      default: 1.0
      selector: { number: { min: 0.0, max: 3.0, step: 0.5, unit_of_measurement: °C } }

    # --- GLOBALE WEER & MARGE INSTELLINGEN ---
    buiten_temp_verwarmen:
      name: "Verwarmen als het buiten kouder is dan:"
      default: 18
      selector: { number: { min: 10, max: 30, step: 0.5, unit_of_measurement: °C } }
    buiten_temp_koelen:
      name: "Koelen als het buiten warmer is dan:"
      default: 22
      selector: { number: { min: 10, max: 30, step: 0.5, unit_of_measurement: °C } }
    marge_boven:
      name: "Marge Boven Doel"
      default: 1.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }
    marge_onder:
      name: "Marge Onder Doel"
      default: 1.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }

mode: single

# 1. TRIGGERS: De code luistert nu naar 7 verschillende tijden!
trigger:
  - platform: time
    at: !input wk_tijd_dag
  - platform: time
    at: !input wk_tijd_nacht
  - platform: time
    at: !input kk_tijd_dag
  - platform: time
    at: !input kk_tijd_nacht
  - platform: time
    at: !input bv_tijd_dag
  - platform: time
    at: !input bv_tijd_pre_bed
  - platform: time
    at: !input bv_tijd_nacht
  - platform: state
    entity_id: 
      - !input airco_woonkamer
      - !input airco_keuken
      - !input airco_boven
    attribute: current_temperature
  - platform: state
    entity_id: !input telefoons
    to: 'not_home'
    for:
      minutes: !input afwezigheid_minuten
  - platform: state
    entity_id: !input telefoons
    to: 'home'
  - platform: numeric_state
    entity_id: !input accu_sensor
    above: !input accu_drempel
  - platform: numeric_state
    entity_id: !input accu_sensor
    below: !input accu_drempel

action:
  # 2. VARIABELEN & REKENWERK
  - variables:
      # Globale vars
      buiten_sensor_var: !input buiten_sensor
      omslag_koud: !input buiten_temp_verwarmen
      omslag_warm: !input buiten_temp_koelen
      telefoons_var: !input telefoons
      accu_sensor_var: !input accu_sensor
      accu_drempel_var: !input accu_drempel
      accu_boost_var: !input accu_boost
      marge_b: !input marge_boven
      marge_o: !input marge_onder
      
      # Woonkamer vars
      airco_wk_var: !input airco_woonkamer
      wk_t_dag: !input wk_tijd_dag
      wk_t_nacht: !input wk_tijd_nacht
      wk_h: !input wk_temp_home
      wk_a: !input wk_temp_away
      wk_n: !input wk_temp_night
      
      # Keuken vars
      airco_kk_var: !input airco_keuken
      kk_t_dag: !input kk_tijd_dag
      kk_t_nacht: !input kk_tijd_nacht
      kk_h: !input kk_temp_home
      kk_a: !input kk_temp_away
      kk_n: !input kk_temp_night
      
      # Boven vars
      airco_bv_var: !input airco_boven
      bv_t_dag: !input bv_tijd_dag
      bv_t_pre: !input bv_tijd_pre_bed
      bv_t_nacht: !input bv_tijd_nacht
      bv_h: !input bv_temp_home
      bv_p: !input bv_temp_pre_bed
      bv_a: !input bv_temp_away
      bv_n: !input bv_temp_night
      
      # Is er iemand thuis?
      iemand_thuis: >
        {{ expand(telefoons_var) | selectattr('state', 'eq', 'home') | list | length > 0 }}

      # Dag/Nacht schema per kamer berekenen
      is_dag_wk: >
        {% set start = today_at(wk_t_dag) %}
        {% set end = today_at(wk_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_dag_kk: >
        {% set start = today_at(kk_t_dag) %}
        {% set end = today_at(kk_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_dag_bv: >
        {% set start = today_at(bv_t_dag) %}
        {% set end = today_at(bv_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_pre_bed_bv: >
        {% set start = today_at(bv_t_pre) %}
        {% set end = today_at(bv_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
      
      # Modus bepalen o.b.v. buitentemperatuur
      buiten_temp: "{{ states(buiten_sensor_var) | float(20) }}"
      gekozen_modus: >
        {% if buiten_temp <= omslag_koud %} heat
        {% elif buiten_temp >= omslag_warm %} cool
        {% else %} off {% endif %}

      # Accu boost bepalen PER KAMER (alleen toepassen als de kamer overdag-modus heeft)
      actuele_soc: "{{ states(accu_sensor_var) | float(0) }}"
      boost_wk: >
        {% if actuele_soc >= accu_drempel_var and iemand_thuis and is_dag_wk %} {{ accu_boost_var }} {% else %} 0 {% endif %}
      boost_kk: >
        {% if actuele_soc >= accu_drempel_var and iemand_thuis and is_dag_kk %} {{ accu_boost_var }} {% else %} 0 {% endif %}
      boost_bv: >
        {% if actuele_soc >= accu_drempel_var and iemand_thuis and is_dag_bv %} {{ accu_boost_var }} {% else %} 0 {% endif %}
        
      # Doeltemperaturen berekenen (Inclusief Pre-Bed voor boven!)
      doel_wk_basis: >
        {% if not iemand_thuis %} {{ wk_a }}
        {% elif not is_dag_wk %} {{ wk_n }}
        {% else %} {{ wk_h }} {% endif %}
      doel_wk: >
        {% if gekozen_modus == 'heat' %} {{ doel_wk_basis | float + boost_wk | float }}
        {% elif gekozen_modus == 'cool' %} {{ doel_wk_basis | float - boost_wk | float }}
        {% else %} {{ doel_wk_basis | float }} {% endif %}
        
      doel_kk_basis: >
        {% if not iemand_thuis %} {{ kk_a }}
        {% elif not is_dag_kk %} {{ kk_n }}
        {% else %} {{ kk_h }} {% endif %}
      doel_kk: >
        {% if gekozen_modus == 'heat' %} {{ doel_kk_basis | float + boost_kk | float }}
        {% elif gekozen_modus == 'cool' %} {{ doel_kk_basis | float - boost_kk | float }}
        {% else %} {{ doel_kk_basis | float }} {% endif %}
        
      doel_bv_basis: >
        {% if not iemand_thuis %} {{ bv_a }}
        {% elif is_pre_bed_bv %} {{ bv_p }}
        {% elif not is_dag_bv %} {{ bv_n }}
        {% else %} {{ bv_h }} {% endif %}
      doel_bv: >
        {% if gekozen_modus == 'heat' %} {{ doel_bv_basis | float + boost_bv | float }}
        {% elif gekozen_modus == 'cool' %} {{ doel_bv_basis | float - boost_bv | float }}
        {% else %} {{ doel_bv_basis | float }} {% endif %}

      # Actuele temperatuur ophalen per kamer
      huidig_wk: "{{ state_attr(airco_wk_var, 'current_temperature') | float(doel_wk) }}"
      huidig_kk: "{{ state_attr(airco_kk_var, 'current_temperature') | float(doel_kk) }}"
      huidig_bv: "{{ state_attr(airco_bv_var, 'current_temperature') | float(doel_bv) }}"

  # 3. ACTIES UITVOEREN
  - choose:
      # --- ALLES UIT (DODE ZONE) ---
      - conditions:
          - condition: template
            value_template: "{{ gekozen_modus == 'off' }}"
        sequence:
          - service: climate.set_hvac_mode
            target:
              entity_id: 
                - !input airco_woonkamer
                - !input airco_keuken
                - !input airco_boven
            data:
              hvac_mode: "off"
              
    default:
      # --- BEOORDELING WOONKAMER ---
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_wk >= (doel_wk | float + marge_b | float) }}
                  {% else %}
                    {{ huidig_wk <= (doel_wk | float - marge_o | float) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_woonkamer
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_wk <= (doel_wk | float - marge_o | float) }}
                  {% else %}
                    {{ huidig_wk >= (doel_wk | float + marge_b | float) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_woonkamer
                data:
                  temperature: "{{ doel_wk }}"
                  hvac_mode: "{{ gekozen_modus }}"

      # --- BEOORDELING KEUKEN ---
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_kk >= (doel_kk | float + marge_b | float) }}
                  {% else %}
                    {{ huidig_kk <= (doel_kk | float - marge_o | float) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_keuken
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_kk <= (doel_kk | float - marge_o | float) }}
                  {% else %}
                    {{ huidig_kk >= (doel_kk | float + marge_b | float) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_keuken
                data:
                  temperature: "{{ doel_kk }}"
                  hvac_mode: "{{ gekozen_modus }}"

      # --- BEOORDELING BOVEN ---
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_bv >= (doel_bv | float + marge_b | float) }}
                  {% else %}
                    {{ huidig_bv <= (doel_bv | float - marge_o | float) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_boven
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_bv <= (doel_bv | float - marge_o | float) }}
                  {% else %}
                    {{ huidig_bv >= (doel_bv | float + marge_b | float) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_boven
                data:
                  temperature: "{{ doel_bv }}"
                  hvac_mode: "{{ gekozen_modus }}"

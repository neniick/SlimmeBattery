blueprint:
  name: "Slimme Airco Besturing (Dubbele Doeltemperatuur)"
  description: "Aparte temperaturen voor Verwarmen en Koelen per tijdslot, inclusief [UIT] schakelaars en gesplitste marges."
  domain: automation
  input:
    # --- AANWEZIGHEID & APPARATEN ---
    telefoons:
      name: "Telefoons van Bewoners (WiFi)"
      selector: { entity: { domain: device_tracker, multiple: true } }
    afwezigheid_minuten:
      name: "Vertraging bij Vertrek (Minuten)"
      default: 15
      selector: { number: { min: 0, max: 60, step: 1, unit_of_measurement: min } }
    buiten_sensor:
      name: "Actuele Buitentemperatuur Sensor"
      default: sensor.temperatuur
      selector: { entity: { domain: sensor, device_class: temperature } }
    buiten_max_sensor:
      name: "Max. Temperatuur Vandaag (Vooruitkijken)"
      selector: { entity: { domain: sensor, device_class: temperature } }

    # --- INSTELLINGEN WOONKAMER ---
    airco_woonkamer:
      name: "Airco Woonkamer"
      selector: { entity: { domain: climate } }
    wk_tijd_dag:
      name: "Woonkamer - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    wk_tijd_nacht:
      name: "Woonkamer - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    wk_uit_thuis:
      name: "[UIT] Woonkamer - Zet UIT tijdens Dag (Thuis)"
      default: false
      selector: { boolean: {} }
    wk_temp_home_heat:
      name: "Woonkamer - Verwarmen (Thuis)"
      default: 21
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_temp_home_cool:
      name: "Woonkamer - Koelen (Thuis)"
      default: 23
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_uit_weg:
      name: "[UIT] Woonkamer - Zet UIT tijdens Weg"
      default: false
      selector: { boolean: {} }
    wk_temp_away_heat:
      name: "Woonkamer - Verwarmen (Weg)"
      default: 18
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_temp_away_cool:
      name: "Woonkamer - Koelen (Weg)"
      default: 26
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_uit_nacht:
      name: "[UIT] Woonkamer - Zet UIT in de Nacht"
      default: false
      selector: { boolean: {} }
    wk_temp_night_heat:
      name: "Woonkamer - Verwarmen (Nacht)"
      default: 18
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    wk_temp_night_cool:
      name: "Woonkamer - Koelen (Nacht)"
      default: 25
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- INSTELLINGEN KEUKEN ---
    airco_keuken:
      name: "Airco Keuken"
      selector: { entity: { domain: climate } }
    kk_tijd_dag:
      name: "Keuken - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    kk_tijd_nacht:
      name: "Keuken - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    kk_uit_thuis:
      name: "[UIT] Keuken - Zet UIT tijdens Dag (Thuis)"
      default: false
      selector: { boolean: {} }
    kk_temp_home_heat:
      name: "Keuken - Verwarmen (Thuis)"
      default: 21
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_temp_home_cool:
      name: "Keuken - Koelen (Thuis)"
      default: 23
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_uit_weg:
      name: "[UIT] Keuken - Zet UIT tijdens Weg"
      default: false
      selector: { boolean: {} }
    kk_temp_away_heat:
      name: "Keuken - Verwarmen (Weg)"
      default: 18
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_temp_away_cool:
      name: "Keuken - Koelen (Weg)"
      default: 26
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_uit_nacht:
      name: "[UIT] Keuken - Zet UIT in de Nacht"
      default: false
      selector: { boolean: {} }
    kk_temp_night_heat:
      name: "Keuken - Verwarmen (Nacht)"
      default: 18
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    kk_temp_night_cool:
      name: "Keuken - Koelen (Nacht)"
      default: 25
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- INSTELLINGEN BOVEN ---
    airco_boven:
      name: "Airco Boven"
      selector: { entity: { domain: climate } }
    bv_tijd_dag:
      name: "Boven - Start Dag"
      default: "07:00:00"
      selector: { time: {} }
    bv_tijd_pre_bed:
      name: "Boven - Start Pre-Bed"
      default: "22:00:00"
      selector: { time: {} }
    bv_tijd_nacht:
      name: "Boven - Start Nacht"
      default: "23:00:00"
      selector: { time: {} }
    bv_uit_thuis:
      name: "[UIT] Boven - Zet UIT tijdens Dag (Thuis)"
      default: false
      selector: { boolean: {} }
    bv_temp_home_heat:
      name: "Boven - Verwarmen (Thuis)"
      default: 19
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_temp_home_cool:
      name: "Boven - Koelen (Thuis)"
      default: 24
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_uit_pre_bed:
      name: "[UIT] Boven - Zet UIT tijdens Pre-Bed"
      default: false
      selector: { boolean: {} }
    bv_temp_pre_bed_heat:
      name: "Boven - Verwarmen (Pre-Bed)"
      default: 21
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_temp_pre_bed_cool:
      name: "Boven - Koelen (Pre-Bed)"
      default: 22
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_uit_weg:
      name: "[UIT] Boven - Zet UIT tijdens Weg"
      default: false
      selector: { boolean: {} }
    bv_temp_away_heat:
      name: "Boven - Verwarmen (Weg)"
      default: 18
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_temp_away_cool:
      name: "Boven - Koelen (Weg)"
      default: 26
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_uit_nacht:
      name: "[UIT] Boven - Zet UIT in de Nacht"
      default: true
      selector: { boolean: {} }
    bv_temp_night_heat:
      name: "Boven - Verwarmen (Nacht)"
      default: 18
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }
    bv_temp_night_cool:
      name: "Boven - Koelen (Nacht)"
      default: 24
      selector: { number: { min: 18, max: 30, step: 0.5, unit_of_measurement: °C } }

    # --- GLOBALE WEER & MARGE INSTELLINGEN ---
    buiten_temp_verwarmen:
      name: "Verwarmen als max/actueel kouder is dan:"
      default: 18
      selector: { number: { min: 10, max: 30, step: 0.5, unit_of_measurement: °C } }
    buiten_temp_koelen:
      name: "Koelen als max/actueel warmer is dan:"
      default: 22
      selector: { number: { min: 10, max: 30, step: 0.5, unit_of_measurement: °C } }
      
    marge_boven_heat:
      name: "Verwarmen: UITschakelen (Graden Boven Doel)"
      default: 5.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }
    marge_onder_heat:
      name: "Verwarmen: INschakelen (Graden Onder Doel)"
      default: 1.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }
    marge_boven_cool:
      name: "Koelen: INschakelen (Graden Boven Doel)"
      default: 1.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }
    marge_onder_cool:
      name: "Koelen: UITschakelen (Graden Onder Doel)"
      default: 1.0
      selector: { number: { min: 0.0, max: 5.0, step: 0.5, unit_of_measurement: °C } }

mode: single

trigger:
  - platform: time
    at: !input wk_tijd_dag
  - platform: time
    at: !input wk_tijd_nacht
  - platform: time
    at: !input kk_tijd_dag
  - platform: time
    at: !input kk_tijd_nacht
  - platform: time
    at: !input bv_tijd_dag
  - platform: time
    at: !input bv_tijd_pre_bed
  - platform: time
    at: !input bv_tijd_nacht
  - platform: state
    entity_id: 
      - !input airco_woonkamer
      - !input airco_keuken
      - !input airco_boven
    attribute: current_temperature
  - platform: state
    entity_id: !input telefoons
    from: 'home'
    for:
      minutes: !input afwezigheid_minuten
  - platform: state
    entity_id: !input telefoons
    to: 'home'
  - platform: state
    entity_id: !input buiten_max_sensor

action:
  - variables:
      # Weer en Marges
      buiten_sensor_var: !input buiten_sensor
      buiten_max_sensor_var: !input buiten_max_sensor
      omslag_koud: !input buiten_temp_verwarmen
      omslag_warm: !input buiten_temp_koelen
      telefoons_var: !input telefoons
      
      mh_b: !input marge_boven_heat
      mh_o: !input marge_onder_heat
      mc_b: !input marge_boven_cool
      mc_o: !input marge_onder_cool
      
      # Woonkamer Inputs
      airco_wk_var: !input airco_woonkamer
      wk_t_dag: !input wk_tijd_dag
      wk_t_nacht: !input wk_tijd_nacht
      wk_h_heat: !input wk_temp_home_heat
      wk_h_cool: !input wk_temp_home_cool
      wk_a_heat: !input wk_temp_away_heat
      wk_a_cool: !input wk_temp_away_cool
      wk_n_heat: !input wk_temp_night_heat
      wk_n_cool: !input wk_temp_night_cool
      wk_u_h: !input wk_uit_thuis
      wk_u_a: !input wk_uit_weg
      wk_u_n: !input wk_uit_nacht
      
      # Keuken Inputs
      airco_kk_var: !input airco_keuken
      kk_t_dag: !input kk_tijd_dag
      kk_t_nacht: !input kk_tijd_nacht
      kk_h_heat: !input kk_temp_home_heat
      kk_h_cool: !input kk_temp_home_cool
      kk_a_heat: !input kk_temp_away_heat
      kk_a_cool: !input kk_temp_away_cool
      kk_n_heat: !input kk_temp_night_heat
      kk_n_cool: !input kk_temp_night_cool
      kk_u_h: !input kk_uit_thuis
      kk_u_a: !input kk_uit_weg
      kk_u_n: !input kk_uit_nacht
      
      # Boven Inputs
      airco_bv_var: !input airco_boven
      bv_t_dag: !input bv_tijd_dag
      bv_t_pre: !input bv_tijd_pre_bed
      bv_t_nacht: !input bv_tijd_nacht
      bv_h_heat: !input bv_temp_home_heat
      bv_h_cool: !input bv_temp_home_cool
      bv_p_heat: !input bv_temp_pre_bed_heat
      bv_p_cool: !input bv_temp_pre_bed_cool
      bv_a_heat: !input bv_temp_away_heat
      bv_a_cool: !input bv_temp_away_cool
      bv_n_heat: !input bv_temp_night_heat
      bv_n_cool: !input bv_temp_night_cool
      bv_u_h: !input bv_uit_thuis
      bv_u_p: !input bv_uit_pre_bed
      bv_u_a: !input bv_uit_weg
      bv_u_n: !input bv_uit_nacht
      
      iemand_thuis: >
        {{ expand(telefoons_var) | selectattr('state', 'eq', 'home') | list | length > 0 }}

      is_dag_wk: >
        {% set start = today_at(wk_t_dag) %}
        {% set end = today_at(wk_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_dag_kk: >
        {% set start = today_at(kk_t_dag) %}
        {% set end = today_at(kk_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_dag_bv: >
        {% set start = today_at(bv_t_dag) %}
        {% set end = today_at(bv_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
        
      is_pre_bed_bv: >
        {% set start = today_at(bv_t_pre) %}
        {% set end = today_at(bv_t_nacht) %}
        {% if start < end %} {{ start <= now() < end }} {% else %} {{ now() >= start or now() < end }} {% endif %}
      
      buiten_temp: "{{ states(buiten_sensor_var) | float(20) }}"
      buiten_max: "{{ states(buiten_max_sensor_var) | float(20) }}"
      
      gekozen_modus: >
        {% if buiten_max >= omslag_warm %}
          cool
        {% elif buiten_max <= omslag_koud %}
          heat
        {% else %}
          {% if buiten_temp <= omslag_koud %} heat
          {% elif buiten_temp >= omslag_warm %} cool
          {% else %} off {% endif %}
        {% endif %}

      # --- VERNIEUWDE BEREKENING: Kies automatisch Verwarmen of Koelen ---
      doel_wk: >
        {% if not iemand_thuis %}
          {% if wk_u_a %} off {% elif gekozen_modus == 'cool' %} {{ wk_a_cool }} {% else %} {{ wk_a_heat }} {% endif %}
        {% elif not is_dag_wk %}
          {% if wk_u_n %} off {% elif gekozen_modus == 'cool' %} {{ wk_n_cool }} {% else %} {{ wk_n_heat }} {% endif %}
        {% else %}
          {% if wk_u_h %} off {% elif gekozen_modus == 'cool' %} {{ wk_h_cool }} {% else %} {{ wk_h_heat }} {% endif %}
        {% endif %}
        
      doel_kk: >
        {% if not iemand_thuis %}
          {% if kk_u_a %} off {% elif gekozen_modus == 'cool' %} {{ kk_a_cool }} {% else %} {{ kk_a_heat }} {% endif %}
        {% elif not is_dag_kk %}
          {% if kk_u_n %} off {% elif gekozen_modus == 'cool' %} {{ kk_n_cool }} {% else %} {{ kk_n_heat }} {% endif %}
        {% else %}
          {% if kk_u_h %} off {% elif gekozen_modus == 'cool' %} {{ kk_h_cool }} {% else %} {{ kk_h_heat }} {% endif %}
        {% endif %}
        
      doel_bv: >
        {% if not iemand_thuis %}
          {% if bv_u_a %} off {% elif gekozen_modus == 'cool' %} {{ bv_a_cool }} {% else %} {{ bv_a_heat }} {% endif %}
        {% elif is_pre_bed_bv %}
          {% if bv_u_p %} off {% elif gekozen_modus == 'cool' %} {{ bv_p_cool }} {% else %} {{ bv_p_heat }} {% endif %}
        {% elif not is_dag_bv %}
          {% if bv_u_n %} off {% elif gekozen_modus == 'cool' %} {{ bv_n_cool }} {% else %} {{ bv_n_heat }} {% endif %}
        {% else %}
          {% if bv_u_h %} off {% elif gekozen_modus == 'cool' %} {{ bv_h_cool }} {% else %} {{ bv_h_heat }} {% endif %}
        {% endif %}

      huidig_wk: "{{ state_attr(airco_wk_var, 'current_temperature') | float(20) }}"
      huidig_kk: "{{ state_attr(airco_kk_var, 'current_temperature') | float(20) }}"
      huidig_bv: "{{ state_attr(airco_bv_var, 'current_temperature') | float(20) }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ gekozen_modus == 'off' }}"
        sequence:
          - service: climate.set_hvac_mode
            target:
              entity_id: 
                - !input airco_woonkamer
                - !input airco_keuken
                - !input airco_boven
            data:
              hvac_mode: "off"
              
    default:
      # --- BEOORDELING WOONKAMER ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ doel_wk == 'off' }}"
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_woonkamer
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_wk >= (doel_wk | float(20) + mh_b | float(1)) }}
                  {% else %}
                    {{ huidig_wk <= (doel_wk | float(20) - mc_o | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_woonkamer
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_wk <= (doel_wk | float(20) - mh_o | float(1)) }}
                  {% else %}
                    {{ huidig_wk >= (doel_wk | float(20) + mc_b | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_woonkamer
                data:
                  temperature: "{{ doel_wk }}"
                  hvac_mode: "{{ gekozen_modus }}"

      # --- BEOORDELING KEUKEN ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ doel_kk == 'off' }}"
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_keuken
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_kk >= (doel_kk | float(20) + mh_b | float(1)) }}
                  {% else %}
                    {{ huidig_kk <= (doel_kk | float(20) - mc_o | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_keuken
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_kk <= (doel_kk | float(20) - mh_o | float(1)) }}
                  {% else %}
                    {{ huidig_kk >= (doel_kk | float(20) + mc_b | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_keuken
                data:
                  temperature: "{{ doel_kk }}"
                  hvac_mode: "{{ gekozen_modus }}"

      # --- BEOORDELING BOVEN ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ doel_bv == 'off' }}"
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_boven
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_bv >= (doel_bv | float(20) + mh_b | float(1)) }}
                  {% else %}
                    {{ huidig_bv <= (doel_bv | float(20) - mc_o | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input airco_boven
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if gekozen_modus == 'heat' %}
                    {{ huidig_bv <= (doel_bv | float(20) - mh_o | float(1)) }}
                  {% else %}
                    {{ huidig_bv >= (doel_bv | float(20) + mc_b | float(1)) }}
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input airco_boven
                data:
                  temperature: "{{ doel_bv }}"
                  hvac_mode: "{{ gekozen_modus }}"

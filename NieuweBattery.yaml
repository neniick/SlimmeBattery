blueprint:
  name: "Nul op de Meter + Predictive Solar & Dual Logic (Zon-Slim Handelen)"
  description: >
    De ultieme batterij-manager. 
    1. Overleven: Laadt goedkoop tot Target SOC voor de nacht (inclusief solar check).
    2. Handelen: Laadt tot 100% voor winst, MAAR trekt de verwachte gratis zonnestroom er netjes vanaf!
  domain: automation

  input:
    update_interval:
      name: "Update frequentie"
      default: "/20"
      selector:
        select:
          options: [{label: "10s", value: "/10"}, {label: "20s", value: "/20"}, {label: "30s", value: "/30"}]

    # ---- Sensors ----
    sensor_soc:
      name: "Batterij SOC (%)"
      selector: { entity: { domain: sensor } }
    sensor_house_power:
      name: "Netverbruik (W)"
      selector: { entity: { domain: sensor } }
    sensor_price_value:
      name: "Zonneplan Prijs (€/kWh)"
      selector: { entity: { domain: sensor } }
    sensor_price_level:
      name: "Zonneplan Prijsniveau (Status)"
      selector: { entity: { domain: sensor } }
    sensor_solar_remaining_today:
      name: "Forecast.Solar - Resterende productie VANDAAG (kWh)"
      selector: { entity: { domain: sensor } }
    sensor_solar_forecast_tomorrow:
      name: "Forecast.Solar - Totale productie MORGEN (kWh)"
      selector: { entity: { domain: sensor } }

    # ---- Batterij & Solar Settings ----
    battery_capacity_kwh:
      name: "Batterij Capaciteit (kWh)"
      default: 25
      selector: { number: { min: 2, max: 100, step: 0.5, unit_of_measurement: "kWh" } }
    solar_threshold_low:
      name: "Drempelwaarde: Slechte dag morgen (kWh)"
      default: 7
      selector: { number: { min: 0, max: 20, step: 1 } }
    solar_threshold_high:
      name: "Drempelwaarde: Zonnige dag morgen (kWh)"
      default: 20
      selector: { number: { min: 10, max: 50, step: 1 } }
    target_soc_bad_day:
      name: "Target SOC bij Slechte dag morgen (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 5 } }
    target_soc_normal_day:
      name: "Target SOC bij Normale dag morgen (%)"
      default: 70
      selector: { number: { min: 30, max: 90, step: 5 } }
    target_soc_good_day:
      name: "Target SOC bij Zonnige dag morgen (%)"
      default: 40
      selector: { number: { min: 20, max: 60, step: 5 } }

    # ---- PRIJS & HANDEL SETTINGS ----
    max_survival_price:
      name: "Overleven: Maximale laadprijs (€)"
      description: "Vul de accu voor de nacht op het goedkoopste uur, MITS de prijs onder dit bedrag ligt."
      default: 0.25
      selector: { number: { min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€" } }

    trading_margin:
      name: "Handel: Minimaal prijsverschil voor winst (€)"
      description: "Laad de accu vol (100%) als de winstmarge groot genoeg is, minus de gratis zonnestroom die we nog verwachten!"
      default: 0.10
      selector: { number: { min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€" } }

    # ---- Actuators ----
    select_force_mode:
      name: "Solis Force Mode Selector"
      selector: { entity: { domain: select } }
    number_charge_power:
      name: "Max Charge Power Actuator"
      selector: { entity: { domain: number } }
    number_discharge_power:
      name: "Max Discharge Power Actuator"
      selector: { entity: { domain: number } }
    grid_deadband_w:
      name: "Deadband (W)"
      default: 300
      selector: { number: { min: 50, max: 1000, step: 50 } }

variables:
  v_soc_ent: !input sensor_soc
  v_house_pwr: !input sensor_house_power
  v_price_ent: !input sensor_price_value
  v_price_lvl_ent: !input sensor_price_level
  v_forecast_today: !input sensor_solar_remaining_today
  v_forecast_tomorrow: !input sensor_solar_forecast_tomorrow
  
  v_cap: !input battery_capacity_kwh
  v_low_solar: !input solar_threshold_low
  v_high_solar: !input solar_threshold_high
  v_target_bad: !input target_soc_bad_day
  v_target_norm: !input target_soc_normal_day
  v_target_good: !input target_soc_good_day
  
  v_max_survival_price: !input max_survival_price
  v_trading_margin: !input trading_margin
  v_deadband: !input grid_deadband_w
  v_prefix: "sensor.zonneplan_forcast_tariff_"

trigger:
  - platform: time_pattern
    seconds: !input update_interval

action:
  - variables:
      soc: "{{ states(v_soc_ent) | float(0) }}"
      grid_w: "{{ states(v_house_pwr) | float(0) }}"
      price: "{{ states(v_price_ent) | float(99) }}"
      price_lvl: "{{ states(v_price_lvl_ent) | lower }}"
      
      # Veiligheidsmarge: Reken met 70% van de voorspelde zon
      solar_left_today: "{{ (states(v_forecast_today) | float(0)) * 0.7 }}"
      solar_tomorrow: "{{ states(v_forecast_tomorrow) | float(10) }}"
      
      # 1. Bepaal Dynamisch Target op basis van zon van morgen
      dynamic_target_soc: >-
        {% if solar_tomorrow < v_low_solar %}{{ v_target_bad }}
        {% elif solar_tomorrow > v_high_solar %}{{ v_target_good }}
        {% else %}{{ v_target_norm }}{% endif %}

      target_kwh: "{{ (dynamic_target_soc | float / 100) * v_cap }}"
      current_kwh: "{{ (soc / 100) * v_cap }}"
      
      # Als de accu leeg raakt (<20%), vertrouw dan de zon-voorspelling niet meer
      effective_solar: "{{ 0 if soc < 20 else solar_left_today }}"
      
      # Tekort voor Overleven (tot Target SOC)
      net_charge_needed_kwh: "{{ (target_kwh - (current_kwh + effective_solar)) | max(0) }}"
      
      # Tekort voor Handel (tot 100% van de capaciteit, minus wat de zon nog gaat doen!)
      trade_charge_needed_kwh: "{{ (v_cap - (current_kwh + effective_solar)) | max(0) }}"

      # 2. Lees forecast prijzen uit
      price_analysis: >-
        {% set ns = namespace(p=[]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable',''] %}{% set ns.p = ns.p + [s|float] %}{% endif %}
        {% endfor %}
        {% set min_f = ns.p | min if ns.p else price %}
        {% set max_f = ns.p | max if ns.p else price %}
        
        {% set is_lowest = 'true' if price <= (min_f + 0.0001) else 'false' %}
        {% set is_highest = 'true' if price >= (max_f - 0.0001) else 'false' %}
        {% set margin = max_f - price %}
        
        {{ is_lowest }},{{ is_highest }},{{ margin }}

      is_lowest: "{{ price_analysis.split(',')[0] == 'true' }}"
      is_highest: "{{ price_analysis.split(',')[1] == 'true' }}"
      current_margin: "{{ price_analysis.split(',')[2] | float(0) }}"

      # 3. BESLISBOMEN
      
      # Hersenhelft 1: Overleven (Noodzaak)
      charge_for_survival: >-
        {{ is_lowest and net_charge_needed_kwh > 0.5 and price <= v_max_survival_price }}
        
      # Hersenhelft 2: Handelen (Winst)
      # Nu MET zonne-check: trade_charge_needed_kwh moet groter zijn dan 0.5!
      charge_for_trade: >-
        {{ is_lowest and current_margin >= v_trading_margin and trade_charge_needed_kwh > 0.5 }}

      # Totaal laad-besluit
      should_grid_charge: "{{ price_lvl == 'low' and (charge_for_survival or charge_for_trade) }}"
      
      # Verkoop-besluit (Verkoop nooit je overlevingsbuffer!)
      should_sell: "{{ price_lvl == 'high' and is_highest and soc > dynamic_target_soc }}"

  - variables:
      cur_m: "{{ states(!input select_force_mode) }}"
      cur_c: "{{ states(!input number_charge_power) | float(0) if cur_m == 'Solis RC Force Battery Charge' else 0 }}"
      cur_d: "{{ states(!input number_discharge_power) | float(0) if cur_m == 'Solis RC Force Battery Discharge' else 0 }}"
      real_demand: "{{ grid_w + cur_d - cur_c }}"

      target_mode: >-
        {% if should_grid_charge %}{{ 'Charge' }}
        {% elif should_sell %}{{ 'Discharge' }}
        {% elif real_demand > v_deadband and soc > 15 %}{{ 'Discharge' }}
        {% elif real_demand < (0 - v_deadband) and soc < 100 %}{{ 'Charge' }}
        {% else %}{{ 'None' }}{% endif %}

      target_power: >-
        {% if should_grid_charge %}{{ 4000 }}
        {% elif should_sell %}{{ 4000 }}
        {% elif target_mode == 'Discharge' %}{{ [real_demand | abs | int, 6000] | min }}
        {% elif target_mode == 'Charge' %}{{ [real_demand | abs | int, 8000] | min }}
        {% else %}{{ 0 }}{% endif %}

  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] SOC={{ soc }}%, Target={{ dynamic_target_soc }}%. 
        Tekort: Overleven={{ net_charge_needed_kwh | round(2) }}kWh, Handel={{ trade_charge_needed_kwh | round(2) }}kWh. 
        Marge={{ current_margin | round(2) }}. Besluit: Surv={{ charge_for_survival }}, Trade={{ charge_for_trade }} -> {{ target_mode }}

  - choose:
      - conditions: "{{ target_mode == 'Charge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_charge_power }
            data: { value: "{{ target_power }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Charge" }
      - conditions: "{{ target_mode == 'Discharge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_discharge_power }
            data: { value: "{{ target_power }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Discharge" }
    default:
      - service: select.select_option
        target: { entity_id: !input select_force_mode }
        data: { option: "None" }

mode: single

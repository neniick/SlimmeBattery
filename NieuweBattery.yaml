blueprint:
  name: "Nul op de Meter + Predictive Solar Target (25kWh)"
  description: >
    Past het laaddoel (Target SOC) dynamisch aan op basis van de zonvoorspelling voor morgen.
    Laadt meer bij uit het net als morgen somber is, en laat ruimte over als morgen zonnig is.
  domain: automation

  input:
    update_interval:
      name: "Update frequentie"
      default: "/20"
      selector:
        select:
          options: [{label: "10s", value: "/10"}, {label: "20s", value: "/20"}, {label: "30s", value: "/30"}]

    # ---- Sensors ----
    sensor_soc:
      name: "Batterij SOC (%)"
      selector: { entity: { domain: sensor } }
    sensor_house_power:
      name: "Netverbruik (W)"
      selector: { entity: { domain: sensor } }
    sensor_price_value:
      name: "Zonneplan Prijs (€/kWh)"
      selector: { entity: { domain: sensor } }
    sensor_price_level:
      name: "Zonneplan Prijsniveau (Status)"
      selector: { entity: { domain: sensor } }
    sensor_solar_remaining_today:
      name: "Forecast.Solar - Resterende productie VANDAAG (kWh)"
      selector: { entity: { domain: sensor } }
    sensor_solar_forecast_tomorrow:
      name: "Forecast.Solar - Totale productie MORGEN (kWh)"
      selector: { entity: { domain: sensor } }

    # ---- Dynamische Target Instellingen ----
    battery_capacity_kwh:
      name: "Batterij Capaciteit (kWh)"
      default: 25
      selector: { number: { min: 2, max: 100, step: 0.5, unit_of_measurement: "kWh" } }

    solar_threshold_low:
      name: "Drempelwaarde: Slechte dag (kWh)"
      description: "Als er morgen minder dan dit wordt opgewekt, laden we de accu extra vol."
      default: 7
      selector: { number: { min: 0, max: 20, step: 1, unit_of_measurement: "kWh" } }

    solar_threshold_high:
      name: "Drempelwaarde: Zonnige dag (kWh)"
      description: "Als er morgen meer dan dit wordt opgewekt, laten we de accu leger voor de zon."
      default: 20
      selector: { number: { min: 10, max: 50, step: 1, unit_of_measurement: "kWh" } }

    target_soc_bad_day:
      name: "Target SOC bij Slechte dag (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 5 } }

    target_soc_normal_day:
      name: "Target SOC bij Normale dag (%)"
      default: 70
      selector: { number: { min: 30, max: 90, step: 5 } }

    target_soc_good_day:
      name: "Target SOC bij Zonnige dag (%)"
      default: 40
      selector: { number: { min: 20, max: 60, step: 5 } }

    # ---- Actuators & Nul-op-de-meter ----
    select_force_mode:
      name: "Solis Force Mode Selector"
      selector: { entity: { domain: select } }
    number_charge_power:
      name: "Max Charge Power Actuator"
      selector: { entity: { domain: number } }
    number_discharge_power:
      name: "Max Discharge Power Actuator"
      selector: { entity: { domain: number } }
    grid_deadband_w:
      name: "Deadband (W)"
      default: 300
      selector: { number: { min: 50, max: 1000, step: 50 } }

variables:
  v_soc_ent: !input sensor_soc
  v_house_pwr: !input sensor_house_power
  v_price_ent: !input sensor_price_value
  v_price_lvl_ent: !input sensor_price_level
  v_forecast_today: !input sensor_solar_remaining_today
  v_forecast_tomorrow: !input sensor_solar_forecast_tomorrow
  
  v_cap: !input battery_capacity_kwh
  v_low_solar: !input solar_threshold_low
  v_high_solar: !input solar_threshold_high
  v_target_bad: !input target_soc_bad_day
  v_target_norm: !input target_soc_normal_day
  v_target_good: !input target_soc_good_day
  
  v_deadband: !input grid_deadband_w
  v_prefix: "sensor.zonneplan_forcast_tariff_"

trigger:
  - platform: time_pattern
    seconds: !input update_interval

action:
  - variables:
      soc: "{{ states(v_soc_ent) | float(0) }}"
      grid_w: "{{ states(v_house_pwr) | float(0) }}"
      price: "{{ states(v_price_ent) | float(99) }}"
      price_lvl: "{{ states(v_price_lvl_ent) | lower }}"
      solar_left_today: "{{ states(v_forecast_today) | float(0) }}"
      solar_tomorrow: "{{ states(v_forecast_tomorrow) | float(10) }}"
      
      # --- DYNAMISCH TARGET SOC BEREKENEN ---
      dynamic_target_soc: >-
        {% if solar_tomorrow < v_low_solar %}
          {{ v_target_bad }}
        {% elif solar_tomorrow > v_high_solar %}
          {{ v_target_good }}
        {% else %}
          {{ v_target_norm }}
        {% endif %}

      target_kwh: "{{ (dynamic_target_soc | float / 100) * v_cap }}"
      current_kwh: "{{ (soc / 100) * v_cap }}"
      
      # Tekort = Doel - (Huidig + Zon nog te gaan vandaag)
      net_charge_needed_kwh: "{{ (target_kwh - (current_kwh + solar_left_today)) | max(0) }}"

      # Prijs analyse
      price_analysis: >-
        {% set ns = namespace(p=[]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable',''] %}{% set ns.p = ns.p + [s|float] %}{% endif %}
        {% endfor %}
        {% set min_f = ns.p | min if ns.p else price %}
        {% set max_f = ns.p | max if ns.p else price %}
        {{ 'true' if price <= min_f else 'false' }},{{ 'true' if price >= max_f else 'false' }}

      is_lowest: "{{ price_analysis.split(',')[0] == 'true' }}"
      is_highest: "{{ price_analysis.split(',')[1] == 'true' }}"

      should_grid_charge: "{{ price_lvl == 'low' and net_charge_needed_kwh > 0.5 and is_lowest }}"
      should_sell: "{{ price_lvl == 'high' and is_highest and soc > 40 }}"

  - variables:
      cur_m: "{{ states(!input select_force_mode) }}"
      cur_c: "{{ states(!input number_charge_power) | float(0) if cur_m == 'Solis RC Force Battery Charge' else 0 }}"
      cur_d: "{{ states(!input number_discharge_power) | float(0) if cur_m == 'Solis RC Force Battery Discharge' else 0 }}"
      real_demand: "{{ grid_w + cur_d - cur_c }}"

      target_mode: >-
        {% if should_grid_charge %}{{ 'Charge' }}
        {% elif should_sell %}{{ 'Discharge' }}
        {% elif real_demand > v_deadband and soc > 15 %}{{ 'Discharge' }}
        {% elif real_demand < (0 - v_deadband) and soc < 100 %}{{ 'Charge' }}
        {% else %}{{ 'None' }}{% endif %}

      target_power: >-
        {% if should_grid_charge or should_sell %}{{ 4000 }}
        {% elif target_mode == 'Discharge' %}{{ [real_demand | abs | int, 6000] | min }}
        {% elif target_mode == 'Charge' %}{{ [real_demand | abs | int, 8000] | min }}
        {% else %}{{ 0 }}{% endif %}

  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] Target={{ dynamic_target_soc }}% (Morgen={{ solar_tomorrow }}kWh), 
        Tekort={{ net_charge_needed_kwh | round(2) }}kWh, Modus={{ target_mode }}

  # --- UITVOERING ---
  - choose:
      - conditions: "{{ target_mode == 'Charge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_charge_power }
            data: { value: "{{ target_power }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Charge" }
      - conditions: "{{ target_mode == 'Discharge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_discharge_power }
            data: { value: "{{ target_power }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Discharge" }
    default:
      - service: select.select_option
        target: { entity_id: !input select_force_mode }
        data: { option: "None" }

mode: single

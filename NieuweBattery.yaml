blueprint:
  name: "Nul op de Meter + Predictive Solar (No-Sensor Edition)"
  description: >
    De ultieme slimme batterij-manager zonder de onstabiele fysieke batterijsensor.
    Trader-logica weigert 's nachts te laden als er morgen genoeg zon is.
    Volledig afgeschermd tegen Home Assistant template-crashes.
  domain: automation

  input:
    update_interval:
      name: "Update frequentie"
      default: "/20"
      selector:
        select:
          options: [{label: "10s", value: "/10"}, {label: "20s", value: "/20"}, {label: "30s", value: "/30"}]

    # ---- Sensors ----
    sensor_soc:
      name: "Batterij SOC (%)"
      selector: { entity: { domain: sensor } }
    sensor_house_power:
      name: "Netverbruik P1-Meter (W)"
      description: "Positief = afname/import, negatief = export."
      selector: { entity: { domain: sensor } }

    # ---- Zonneplan & Forecast ----
    sensor_price_value:
      name: "Zonneplan Prijs (€/kWh)"
      selector: { entity: { domain: sensor } }
    sensor_price_level:
      name: "Zonneplan Prijsniveau (Status)"
      selector: { entity: { domain: sensor } }
    forecast_sensor_prefix:
      name: "Zonneplan Forecast Prefix"
      default: "sensor.zonneplan_forcast_tariff_"
      selector: { text: {} }
    sensor_solar_remaining_today:
      name: "Forecast.Solar - Resterende productie VANDAAG (kWh)"
      selector: { entity: { domain: sensor } }
    sensor_solar_forecast_tomorrow:
      name: "Forecast.Solar - Totale productie MORGEN (kWh)"
      selector: { entity: { domain: sensor } }

    # ---- Batterij Capaciteit & Targets ----
    battery_capacity_kwh:
      name: "Batterij Capaciteit (kWh)"
      default: 25
      selector: { number: { min: 2, max: 100, step: 0.5, unit_of_measurement: "kWh" } }
    solar_threshold_low:
      name: "Drempelwaarde: Slechte dag morgen (kWh)"
      default: 7
      selector: { number: { min: 0, max: 20, step: 1 } }
    solar_threshold_high:
      name: "Drempelwaarde: Zonnige dag morgen (kWh)"
      default: 20
      selector: { number: { min: 10, max: 50, step: 1 } }
    target_soc_bad_day:
      name: "Target SOC bij Slechte dag morgen (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 5 } }
    target_soc_normal_day:
      name: "Target SOC bij Normale dag morgen (%)"
      default: 70
      selector: { number: { min: 30, max: 90, step: 5 } }
    target_soc_good_day:
      name: "Target SOC bij Zonnige dag morgen (%)"
      default: 40
      selector: { number: { min: 20, max: 60, step: 5 } }

    # ---- PRIJS & HANDEL SETTINGS ----
    max_survival_price:
      name: "Overleven: Maximale laadprijs (€)"
      default: 0.25
      selector: { number: { min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€" } }
    trading_margin:
      name: "Handel: Minimaal prijsverschil voor winst (€)"
      default: 0.10
      selector: { number: { min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€" } }
    max_trade_soc:
      name: "Handel: Maximale SOC (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 5, unit_of_measurement: "%" } }

    # ---- Nul-op-de-meter & Net Limieten ----
    grid_deadband_w:
      name: "Deadband (W) - Nul op de meter"
      description: "Batterij reageert pas als de P1 meter dit aantal Watt overschrijdt."
      default: 300
      selector: { number: { min: 50, max: 1000, step: 50 } }
    max_charge_power:
      name: "Zon-Laden: Max vermogen (W)"
      default: 8000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }
    max_discharge_power:
      name: "Huis-Leveren: Max vermogen (W)"
      default: 6000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }
    max_grid_charge_power:
      name: "Net-Laden: Max vermogen (W)"
      default: 3000
      selector: { number: { min: 1000, max: 10000, step: 100, unit_of_measurement: "W" } }
    max_grid_discharge_power:
      name: "Net-Verkopen: Max vermogen (W)"
      default: 4000
      selector: { number: { min: 1000, max: 10000, step: 100, unit_of_measurement: "W" } }

    # ---- Actuators ----
    select_force_mode:
      name: "Solis Force Mode Selector"
      selector: { entity: { domain: select } }
    number_charge_power:
      name: "Max Charge Power Actuator"
      selector: { entity: { domain: number } }
    number_discharge_power:
      name: "Max Discharge Power Actuator"
      selector: { entity: { domain: number } }

variables:
  v_soc_ent: !input sensor_soc
  v_house_pwr: !input sensor_house_power
  v_price_ent: !input sensor_price_value
  v_price_lvl_ent: !input sensor_price_level
  v_prefix: !input forecast_sensor_prefix
  v_forecast_today: !input sensor_solar_remaining_today
  v_forecast_tomorrow: !input sensor_solar_forecast_tomorrow
  v_cap: !input battery_capacity_kwh
  v_low_solar: !input solar_threshold_low
  v_high_solar: !input solar_threshold_high
  v_target_bad: !input target_soc_bad_day
  v_target_norm: !input target_soc_normal_day
  v_target_good: !input target_soc_good_day
  v_max_survival_price: !input max_survival_price
  v_trading_margin: !input trading_margin
  v_max_trade_soc: !input max_trade_soc
  v_deadband: !input grid_deadband_w
  v_max_charge: !input max_charge_power
  v_max_discharge: !input max_discharge_power
  v_max_grid_charge: !input max_grid_charge_power
  v_max_grid_discharge: !input max_grid_discharge_power
  v_select_force: !input select_force_mode
  v_num_charge: !input number_charge_power
  v_num_discharge: !input number_discharge_power

trigger:
  - platform: time_pattern
    seconds: !input update_interval

action:
  - variables:
      soc: "{{ states(v_soc_ent) | float(0.0) }}"
      grid_w: "{{ states(v_house_pwr) | float(0.0) }}"
      
      # Vraag op wat we zojuist als commando naar de omvormer hebben gestuurd
      cur_m: "{{ states(v_select_force) }}"
      cur_c: "{{ states(v_num_charge) | float(0.0) if cur_m == 'Solis RC Force Battery Charge' else 0.0 }}"
      cur_d: "{{ states(v_num_discharge) | float(0.0) if cur_m == 'Solis RC Force Battery Discharge' else 0.0 }}"
      
      # Bereken het echte huisverbruik door P1 en ons eigen commando bij elkaar te voegen
      real_demand: "{{ grid_w + cur_d - cur_c }}"

      price: "{{ states(v_price_ent) | float(99.0) }}"
      price_lvl: "{{ states(v_price_lvl_ent) | lower }}"
      
      solar_left_today: "{{ (states(v_forecast_today) | float(0.0)) * 0.7 }}"
      solar_tomorrow: "{{ states(v_forecast_tomorrow) | float(10.0) }}"
      
      # Vanaf 15:00 rekenen we morgen mee als 'aankomende zonnestroom'
      current_hour: "{{ now().hour | int(0) }}"
      upcoming_solar: "{{ solar_left_today + (solar_tomorrow if current_hour >= 15 or solar_left_today < 1.0 else 0.0) }}"
      
      dynamic_target_soc: >-
        {% if solar_tomorrow < (v_low_solar | float(7.0)) %}
          {{ v_target_bad | float(95.0) }}
        {% elif solar_tomorrow > (v_high_solar | float(20.0)) %}
          {{ v_target_good | float(40.0) }}
        {% else %}
          {{ v_target_norm | float(70.0) }}
        {% endif %}

      target_kwh: "{{ ((dynamic_target_soc | float(0.0)) / 100.0) * (v_cap | float(25.0)) }}"
      trade_target_kwh: "{{ ((v_max_trade_soc | float(95.0)) / 100.0) * (v_cap | float(25.0)) }}"
      current_kwh: "{{ (soc / 100.0) * (v_cap | float(25.0)) }}"
      
      # Survival gebruikt alleen vandaag (om vanavond te redden)
      survival_solar: "{{ 0.0 if soc < 20 else solar_left_today }}"
      net_charge_needed_kwh: "{{ [(target_kwh - (current_kwh + survival_solar)), 0.0] | max }}"
      
      # Handel gebruikt óók morgen (om niet 's nachts te laden als morgen zonnig is)
      trade_charge_needed_kwh: "{{ [(trade_target_kwh - (current_kwh + upcoming_solar)), 0.0] | max }}"

      price_analysis: >-
        {% set ns = namespace(p=[]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable','none',''] %}
            {% set ns.p = ns.p + [s | float(99.0)] %}
          {% endif %}
        {% endfor %}
        {% set min_f = ns.p | min if ns.p else price %}
        {% set max_f = ns.p | max if ns.p else price %}
        {{ min_f ~ '|' ~ max_f }}

      min_price: "{{ price_analysis.split('|')[0] | float(0.0) }}"
      max_price: "{{ price_analysis.split('|')[1] | float(0.0) }}"
      
      is_lowest_str: "{{ 'true' if price <= (min_price + 0.0001) else 'false' }}"
      is_highest_str: "{{ 'true' if price >= (max_price - 0.0001) else 'false' }}"
      current_margin: "{{ max_price - price }}"

      charge_for_survival_str: >-
        {{ 'true' if (is_lowest_str == 'true' and (net_charge_needed_kwh | float(0.0)) > 0.5 and price <= (v_max_survival_price | float(0.25))) else 'false' }}
        
      charge_for_trade_str: >-
        {{ 'true' if (is_lowest_str == 'true' and current_margin >= (v_trading_margin | float(0.10)) and (trade_charge_needed_kwh | float(0.0)) > 0.5) else 'false' }}

      should_grid_charge_str: >-
        {{ 'true' if (price_lvl == 'low' and (charge_for_survival_str == 'true' or charge_for_trade_str == 'true')) else 'false' }}
        
      should_sell_str: >-
        {{ 'true' if (price_lvl == 'high' and is_highest_str == 'true' and soc > (dynamic_target_soc | float(0.0))) else 'false' }}

  - variables:
      safe_deadband: "{{ v_deadband | float(300.0) }}"

      target_mode: >-
        {% if should_grid_charge_str == 'true' %}{{ 'Charge' }}
        {% elif should_sell_str == 'true' %}{{ 'Discharge' }}
        {% elif real_demand > safe_deadband and soc > 15 %}{{ 'Discharge' }}
        {% elif real_demand < (0 - safe_deadband) and soc < 100 %}{{ 'Charge' }}
        {% else %}{{ 'None' }}{% endif %}

      target_power: >-
        {% if should_grid_charge_str == 'true' %}
          {{ v_max_grid_charge | int(3000) }}
        {% elif should_sell_str == 'true' %}
          {{ v_max_grid_discharge | int(4000) }}
        {% elif target_mode == 'Discharge' %}
          {{ [real_demand | abs | int(0), (v_max_discharge | int(6000))] | min }}
        {% elif target_mode == 'Charge' %}
          {{ [real_demand | abs | int(0), (v_max_charge | int(8000))] | min }}
        {% else %}
          {{ 0 }}
        {% endif %}

  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] Demand={{ real_demand | round(0) }}W. Grid={{ grid_w }}W. 
        Zon komend: {{ upcoming_solar | round(1) }}kWh. Target SOC={{ dynamic_target_soc }}%.
        Tekort Surv={{ net_charge_needed_kwh | round(2) }}kWh, Handel={{ trade_charge_needed_kwh | round(2) }}kWh.
        Mode={{ target_mode }}, Power={{ target_power }}W.

  - choose:
      - conditions: "{{ target_mode == 'Charge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_charge_power }
            data: { value: "{{ target_power | int(0) }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Charge" }
            
      - conditions: "{{ target_mode == 'Discharge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_discharge_power }
            data: { value: "{{ target_power | int(0) }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Discharge" }
            
    default:
      - service: select.select_option
        target: { entity_id: !input select_force_mode }
        data: { option: "None" }

mode: single

blueprint:
  name: "Nul op de Meter + Ultimate Energy Management (25kWh)"
  description: >
    State-of-the-art controle. Inclusief Peak Shaving, ROI-marge check, Multi-Hour laden, 
    Dynamische verkoopgrenzen en een Negatieve-Prijs override. Bugvrij.
  domain: automation

  input:
    update_interval:
      name: "Update frequentie"
      default: "/20"
      selector:
        select:
          options: [{label: "10s", value: "/10"}, {label: "20s", value: "/20"}, {label: "30s", value: "/30"}]

    # ---- Sensors ----
    sensor_soc:
      name: "Batterij SOC (%)"
      selector: { entity: { domain: sensor } }
    sensor_house_power:
      name: "Netverbruik (W)"
      description: "Positief = Import, Negatief = Export"
      selector: { entity: { domain: sensor } }
    sensor_price_value:
      name: "Actuele Prijs Sensor (€/kWh)"
      selector: { entity: { domain: sensor } }
    sensor_price_level:
      name: "Prijsniveau Sensor (Status: low/normal/high)"
      selector: { entity: { domain: sensor } }
    forecast_sensor_prefix:
      name: "Prefix Toekomstige Prijzen"
      description: "Bijv: sensor.zonneplan_forcast_tariff_"
      default: "sensor.zonneplan_forcast_tariff_"
      selector: { text: {} }
    sensor_solar_remaining_today:
      name: "Forecast - Resterende productie VANDAAG (kWh)"
      selector: { entity: { domain: sensor } }
    sensor_solar_forecast_tomorrow:
      name: "Forecast - Totale productie MORGEN (kWh)"
      selector: { entity: { domain: sensor } }

    # ---- Batterij & Aansluiting ----
    battery_capacity_kwh:
      name: "Batterij Capaciteit (kWh)"
      default: 25
      selector: { number: { min: 2, max: 100, step: 0.5, unit_of_measurement: "kWh" } }

    peak_shaving_max_w:
      name: "Peak Shaving: Max. Netaansluiting (W)"
      description: "De accu knijpt het laadvermogen af als je totale huisverbruik hier overheen dreigt te gaan."
      default: 12000
      selector: { number: { min: 1000, max: 25000, step: 500, unit_of_measurement: "W" } }

    # ---- Handel & ROI (Return on Investment) ----
    roi_margin_eur:
      name: "Handel: Minimale Winstmarge (€)"
      description: "Het verschil tussen hoogste en laagste prijs moet groter zijn dan dit bedrag, anders geen handel."
      default: 0.08
      selector: { number: { min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€" } }

    # ---- Zonne-Drempels ----
    solar_threshold_low:
      name: "Drempel: Slechte dag (kWh)"
      default: 7
      selector: { number: { min: 0, max: 20, step: 1, unit_of_measurement: "kWh" } }

    solar_threshold_high:
      name: "Drempel: Zonnige dag (kWh)"
      default: 20
      selector: { number: { min: 10, max: 50, step: 1, unit_of_measurement: "kWh" } }

    # ---- Target SOC's ----
    target_soc_bad_day:
      name: "Doel SOC: Slechte dag (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 5 } }

    target_soc_normal_day:
      name: "Doel SOC: Normale dag (%)"
      default: 75
      selector: { number: { min: 30, max: 90, step: 5 } }

    target_soc_good_day:
      name: "Doel SOC: Zonnige dag (%)"
      default: 40
      selector: { number: { min: 20, max: 60, step: 5 } }

    # ---- Vermogens ----
    price_override_charge_power:
      name: "Prijs: Laadvermogen (W)"
      default: 4000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }

    price_override_discharge_power:
      name: "Prijs: Ontlaadvermogen (W)"
      default: 4000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }

    max_charge_power:
      name: "Max laadvermogen Huisverbruik (W)"
      default: 8000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }

    max_discharge_power:
      name: "Max ontlaadvermogen Huisverbruik (W)"
      default: 6000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }

    # ---- Actuators ----
    select_force_mode:
      name: "Solis Force Mode Selector"
      selector: { entity: { domain: select } }
    number_charge_power:
      name: "Max Charge Power Actuator"
      selector: { entity: { domain: number } }
    number_discharge_power:
      name: "Max Discharge Power Actuator"
      selector: { entity: { domain: number } }
    grid_deadband_w:
      name: "Deadband (W)"
      default: 300
      selector: { number: { min: 50, max: 1000, step: 50 } }

variables:
  v_soc_ent: !input sensor_soc
  v_house_pwr: !input sensor_house_power
  v_price_ent: !input sensor_price_value
  v_price_lvl_ent: !input sensor_price_level
  v_forecast_today: !input sensor_solar_remaining_today
  v_forecast_tomorrow: !input sensor_solar_forecast_tomorrow
  
  v_cap: !input battery_capacity_kwh
  v_peak_w: !input peak_shaving_max_w
  v_roi_margin: !input roi_margin_eur

  v_low_solar: !input solar_threshold_low
  v_high_solar: !input solar_threshold_high
  v_target_bad: !input target_soc_bad_day
  v_target_norm: !input target_soc_normal_day
  v_target_good: !input target_soc_good_day
  
  v_price_charge_pwr: !input price_override_charge_power
  v_price_discharge_pwr: !input price_override_discharge_power
  v_max_charge: !input max_charge_power
  v_max_discharge: !input max_discharge_power

  v_deadband: !input grid_deadband_w
  v_prefix: !input forecast_sensor_prefix

  v_select_force: !input select_force_mode
  v_num_charge: !input number_charge_power
  v_num_discharge: !input number_discharge_power

trigger:
  - platform: time_pattern
    seconds: !input update_interval

action:
  # STAP 1: Basisgegevens ophalen
  - variables:
      soc: "{{ states(v_soc_ent) | float(0) }}"
      grid_w: "{{ states(v_house_pwr) | float(0) }}"
      cp: "{{ states(v_price_ent) | float(99) }}"
      price_lvl: "{{ states(v_price_lvl_ent) | lower }}"
      solar_left_today: "{{ states(v_forecast_today) | float(0) }}"
      solar_tomorrow: "{{ states(v_forecast_tomorrow) | float(10) }}"
      is_negative: "{{ cp < 0 }}"

  # STAP 2: Bereken doelen (Volledig losgekoppeld om JSON-fouten te voorkomen)
  - variables:
      dyn_target: >-
        {% set th_low = v_low_solar | float(7) %}
        {% set th_high = v_high_solar | float(20) %}
        {% if is_negative %}100
        {% elif solar_tomorrow < th_low %}{{ v_target_bad }}
        {% elif solar_tomorrow > th_high %}{{ v_target_good }}
        {% else %}{{ v_target_norm }}
        {% endif %}

      dyn_sell_min: >-
        {% set th_low = v_low_solar | float(7) %}
        {% set th_high = v_high_solar | float(20) %}
        {% if is_negative %}100
        {% elif solar_tomorrow < th_low %}70
        {% elif solar_tomorrow > th_high %}15
        {% else %}40
        {% endif %}

      target_kwh: "{{ (dyn_target | float(75) / 100) * (v_cap | float(25)) }}"
      current_kwh: "{{ (soc / 100) * (v_cap | float(25)) }}"
      
      # Wat moeten we uit het net laden? (Niet minder dan 0)
      net_charge_needed_kwh: "{{ [(target_kwh - current_kwh - solar_left_today), 0] | max }}"

  # STAP 3: Markt Analyse (Elke check is geïsoleerd om type-crashes te voorkomen)
  - variables:
      is_cheap_enough: >-
        {% set ns = namespace(p=[cp]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable',''] %}{% set ns.p = ns.p + [s|float] %}{% endif %}
        {% endfor %}
        {% set sorted_p = ns.p | sort %}
        {% set chg_kw = [v_price_charge_pwr | float(4000), 100] | max / 1000 %}
        {% set needed_hrs = (net_charge_needed_kwh / chg_kw) | round(0, 'ceil') | int %}
        {% set max_idx = [needed_hrs - 1, 0] | max %}
        {% set max_idx = [max_idx, (sorted_p | length) - 1] | min %}
        {{ cp <= sorted_p[max_idx] }}

      is_highest: >-
        {% set ns = namespace(p=[cp]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable',''] %}{% set ns.p = ns.p + [s|float] %}{% endif %}
        {% endfor %}
        {{ cp >= (ns.p | max) }}

      trade_ok: >-
        {% set ns = namespace(p=[cp]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable',''] %}{% set ns.p = ns.p + [s|float] %}{% endif %}
        {% endfor %}
        {{ (ns.p | max - ns.p | min) >= (v_roi_margin | float(0.08)) }}

  # STAP 4: Definitieve handelsbeslissing
  - variables:
      should_grid_charge: "{{ is_negative or (price_lvl == 'low' and is_cheap_enough and trade_ok and net_charge_needed_kwh > 0.2) }}"
      should_sell: "{{ price_lvl == 'high' and is_highest and trade_ok and soc > (dyn_sell_min | float(40)) and not is_negative }}"

  # STAP 5: Aansturing omvormer & Peak Shaving
  - variables:
      cur_m: "{{ states(v_select_force) }}"
      cur_c: "{{ states(v_num_charge) | float(0) if cur_m == 'Solis RC Force Battery Charge' else 0 }}"
      cur_d: "{{ states(v_num_discharge) | float(0) if cur_m == 'Solis RC Force Battery Discharge' else 0 }}"
      real_demand: "{{ grid_w + cur_d - cur_c }}"

      target_mode: >-
        {% if should_grid_charge %}Charge
        {% elif should_sell %}Discharge
        {% elif real_demand > v_deadband and soc > 10 %}Discharge
        {% elif real_demand < (0 - v_deadband) and soc < 100 %}Charge
        {% else %}None{% endif %}

      target_power: >-
        {% set max_dis = v_max_discharge | float(6000) %}
        {% set max_chg = v_max_charge | float(8000) %}
        {% set p_chg = v_price_charge_pwr | float(4000) %}
        {% set p_dis = v_price_discharge_pwr | float(4000) %}
        {% set peak_w = v_peak_w | float(12000) %}
        
        {% set max_allowed_chg = [(peak_w - real_demand), 0] | max %}

        {% if should_grid_charge %}
          {{ [p_chg, max_allowed_chg] | min }}
        {% elif should_sell %}
          {{ p_dis }}
        {% elif target_mode == 'Discharge' %}
          {{ [real_demand | abs | int, max_dis] | min }}
        {% elif target_mode == 'Charge' %}
          {{ [real_demand | abs | int, max_chg, max_allowed_chg] | min }}
        {% else %}
          0
        {% endif %}

  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] Mode={{ target_mode }}({{ target_power }}W), SOC={{ soc }}%(Doel:{{ dyn_target | float(0) }}%), 
        Tekort={{ net_charge_needed_kwh | round(2) }}kWh. ROI-OK={{ trade_ok }}, Negatief={{ is_negative }}.

  # STAP 6: Commando naar Solis
  - choose:
      - conditions: "{{ target_mode == 'Charge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_charge_power }
            data: { value: "{{ target_power }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Charge" }
      - conditions: "{{ target_mode == 'Discharge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_discharge_power }
            data: { value: "{{ target_power }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Discharge" }
    default:
      - service: select.select_option
        target: { entity_id: !input select_force_mode }
        data: { option: "None" }

mode: single

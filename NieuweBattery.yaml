blueprint:
  name: "Nul op de Meter + Predictive Solar (5-Brain Power Edition) V2"
  description: >
    Keert terug naar perfecte 0-op-de-meter wiskunde.
    Bevat 5 afzonderlijke vermogens-sliders.
    Fix voor de NoneType iterable crash!
  domain: automation

  input:
    update_interval:
      name: "Update frequentie"
      default: "/20"
      selector:
        select:
          options: [{label: "10s", value: "/10"}, {label: "20s", value: "/20"}, {label: "30s", value: "/30"}]

    # ---- Sensors ----
    sensor_soc:
      name: "Batterij SOC (%)"
      selector: { entity: { domain: sensor } }
    sensor_house_power:
      name: "Netverbruik P1-Meter (W)"
      description: "Positief = afname/import, negatief = export."
      selector: { entity: { domain: sensor } }

    # ---- Zonneplan & Forecast ----
    sensor_price_value:
      name: "Zonneplan Prijs (€/kWh)"
      selector: { entity: { domain: sensor } }
    sensor_price_level:
      name: "Zonneplan Prijsniveau (Status)"
      selector: { entity: { domain: sensor } }
    forecast_sensor_prefix:
      name: "Zonneplan Forecast Prefix"
      default: "sensor.zonneplan_forcast_tariff_"
      selector: { text: {} }
    sensor_solar_remaining_today:
      name: "Forecast.Solar - Resterende productie VANDAAG (kWh)"
      selector: { entity: { domain: sensor } }
    sensor_solar_forecast_tomorrow:
      name: "Forecast.Solar - Totale productie MORGEN (kWh)"
      selector: { entity: { domain: sensor } }

    # ---- Batterij Capaciteit & Targets ----
    battery_capacity_kwh:
      name: "Batterij Capaciteit (kWh)"
      default: 25
      selector: { number: { min: 2, max: 100, step: 0.5, unit_of_measurement: "kWh" } }
    solar_threshold_low:
      name: "Drempelwaarde: Slechte dag morgen (kWh)"
      default: 7
      selector: { number: { min: 0, max: 20, step: 1 } }
    solar_threshold_high:
      name: "Drempelwaarde: Zonnige dag morgen (kWh)"
      default: 20
      selector: { number: { min: 10, max: 50, step: 1 } }
    target_soc_bad_day:
      name: "Target SOC bij Slechte dag morgen (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 5 } }
    target_soc_normal_day:
      name: "Target SOC bij Normale dag morgen (%)"
      default: 70
      selector: { number: { min: 30, max: 90, step: 5 } }
    target_soc_good_day:
      name: "Target SOC bij Zonnige dag morgen (%)"
      default: 40
      selector: { number: { min: 20, max: 60, step: 5 } }

    # ---- PRIJS & HANDEL SETTINGS ----
    max_survival_price:
      name: "Overleven: Maximale laadprijs (€)"
      default: 0.25
      selector: { number: { min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€" } }
    trading_margin:
      name: "Handel: Minimaal prijsverschil voor winst (€)"
      default: 0.10
      selector: { number: { min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€" } }
    max_trade_soc:
      name: "Handel: Maximale SOC (%)"
      default: 95
      selector: { number: { min: 50, max: 100, step: 5, unit_of_measurement: "%" } }

    # ---- DE 5 VERMOGENS-SLIDERS ----
    grid_deadband_w:
      name: "Deadband (W) - Nul op de meter"
      default: 300
      selector: { number: { min: 50, max: 1000, step: 50 } }
      
    max_house_charge_power:
      name: "1. Zon-Laden: Max vermogen (W)"
      default: 8000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }
      
    max_house_discharge_power:
      name: "2. Huis-Leveren (Overlever): Max vermogen (W)"
      default: 6000
      selector: { number: { min: 0, max: 10000, step: 100, unit_of_measurement: "W" } }
      
    max_survival_charge_power:
      name: "3. Overleven Net-Laden: Max vermogen (W)"
      default: 2500
      selector: { number: { min: 1000, max: 10000, step: 100, unit_of_measurement: "W" } }

    max_trade_charge_power:
      name: "4. Handel Net-Laden: Max vermogen (W)"
      default: 4000
      selector: { number: { min: 1000, max: 10000, step: 100, unit_of_measurement: "W" } }
      
    max_trade_discharge_power:
      name: "5. Handel Net-Verkopen: Max vermogen (W)"
      default: 4000
      selector: { number: { min: 1000, max: 10000, step: 100, unit_of_measurement: "W" } }

    # ---- Actuators ----
    select_force_mode:
      name: "Solis Force Mode Selector"
      selector: { entity: { domain: select } }
    number_charge_power:
      name: "Max Charge Power Actuator"
      selector: { entity: { domain: number } }
    number_discharge_power:
      name: "Max Discharge Power Actuator"
      selector: { entity: { domain: number } }

variables:
  v_soc_ent: !input sensor_soc
  v_house_pwr: !input sensor_house_power
  v_price_ent: !input sensor_price_value
  v_price_lvl_ent: !input sensor_price_level
  v_prefix: !input forecast_sensor_prefix
  v_forecast_today: !input sensor_solar_remaining_today
  v_forecast_tomorrow: !input sensor_solar_forecast_tomorrow
  v_cap: !input battery_capacity_kwh
  v_low_solar: !input solar_threshold_low
  v_high_solar: !input solar_threshold_high
  v_target_bad: !input target_soc_bad_day
  v_target_norm: !input target_soc_normal_day
  v_target_good: !input target_soc_good_day
  v_max_survival_price: !input max_survival_price
  v_trading_margin: !input trading_margin
  v_max_trade_soc: !input max_trade_soc
  v_deadband: !input grid_deadband_w
  v_max_house_charge: !input max_house_charge_power
  v_max_house_discharge: !input max_house_discharge_power
  v_max_surv_charge: !input max_survival_charge_power
  v_max_trade_charge: !input max_trade_charge_power
  v_max_trade_discharge: !input max_trade_discharge_power
  v_select_force: !input select_force_mode
  v_num_charge: !input number_charge_power
  v_num_discharge: !input number_discharge_power

trigger:
  - platform: time_pattern
    seconds: !input update_interval

action:
  - variables:
      soc: "{{ states(v_soc_ent) | float(0.0) }}"
      grid_w: "{{ states(v_house_pwr) | float(0.0) }}"
      
      cur_m: "{{ states(v_select_force) }}"
      cur_c: "{{ states(v_num_charge) | float(0.0) if cur_m == 'Solis RC Force Battery Charge' else 0.0 }}"
      cur_d: "{{ states(v_num_discharge) | float(0.0) if cur_m == 'Solis RC Force Battery Discharge' else 0.0 }}"
      
      real_demand: "{{ grid_w + cur_d - cur_c }}"

      price: "{{ states(v_price_ent) | float(99.0) }}"
      price_lvl: "{{ states(v_price_lvl_ent) | lower }}"
      
      solar_today_rem: "{{ states(v_forecast_today) | float(0.0) }}"
      solar_tomorrow_tot: "{{ states(v_forecast_tomorrow) | float(10.0) }}"
      current_hour: "{{ now().hour | int(0) }}"
      
      is_prepping_for_tomorrow: "{{ current_hour >= 12 }}"
      forecast_delayed: "{{ current_hour < 5 and solar_today_rem < 0.1 }}"
      
      target_eval_solar: >-
        {% if is_prepping_for_tomorrow | bool(false) or forecast_delayed | bool(false) %}
          {{ solar_tomorrow_tot }}
        {% else %}
          {{ solar_today_rem }}
        {% endif %}
        
      dynamic_target_soc: >-
        {% set s = target_eval_solar | float(10.0) %}
        {% if s < (v_low_solar | float(7.0)) %}
          {{ v_target_bad | float(95.0) }}
        {% elif s > (v_high_solar | float(20.0)) %}
          {{ v_target_good | float(40.0) }}
        {% else %}
          {{ v_target_norm | float(70.0) }}
        {% endif %}

      target_kwh: "{{ (dynamic_target_soc | float(0.0) / 100.0) * (v_cap | float(25.0)) }}"
      trade_target_kwh: "{{ ((v_max_trade_soc | float(95.0)) / 100.0) * (v_cap | float(25.0)) }}"
      current_kwh: "{{ (soc / 100.0) * (v_cap | float(25.0)) }}"
      
      upcoming_solar_raw: >-
        {% if is_prepping_for_tomorrow | bool(false) %}
          {{ solar_today_rem + solar_tomorrow_tot }}
        {% elif forecast_delayed | bool(false) %}
          {{ solar_tomorrow_tot }}
        {% else %}
          {{ solar_today_rem }}
        {% endif %}
        
      safe_solar: "{{ (upcoming_solar_raw | float(0.0)) * 0.7 }}"
      effective_solar: "{{ 0.0 if soc < 20 else (safe_solar | float(0.0)) }}"
      
      net_charge_needed_kwh: "{{ [(target_kwh | float(0.0) - (current_kwh | float(0.0) + effective_solar | float(0.0))), 0.0] | max }}"
      trade_charge_needed_kwh: "{{ [(trade_target_kwh | float(0.0) - (current_kwh | float(0.0) + effective_solar | float(0.0))), 0.0] | max }}"

      min_price: >-
        {% set ns = namespace(p=[]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable','none',''] %}
            {% set ns.p = ns.p + [s | float(99.0)] %}
          {% endif %}
        {% endfor %}
        {{ ns.p | min if ns.p | length > 0 else price }}

      max_price: >-
        {% set ns = namespace(p=[]) %}
        {% for i in range(1, 9) %}
          {% set s = states(v_prefix ~ i) %}
          {% if s not in ['unknown','unavailable','none',''] %}
            {% set ns.p = ns.p + [s | float(99.0)] %}
          {% endif %}
        {% endfor %}
        {{ ns.p | max if ns.p | length > 0 else price }}
      
      is_lowest: "{{ price <= (min_price | float(99.0) + 0.0001) }}"
      is_highest: "{{ price >= (max_price | float(0.0) - 0.0001) }}"
      current_margin: "{{ (max_price | float(0.0)) - price }}"

      charge_for_survival: >-
        {{ is_lowest | bool(false) and (net_charge_needed_kwh | float(0.0)) > 0.5 and price <= (v_max_survival_price | float(0.25)) }}
        
      charge_for_trade: >-
        {{ is_lowest | bool(false) and (current_margin | float(0.0)) >= (v_trading_margin | float(0.10)) and (trade_charge_needed_kwh | float(0.0)) > 0.5 }}

      should_sell: >-
        {{ price_lvl == 'high' and is_highest | bool(false) and soc > (dynamic_target_soc | float(0.0)) }}

  - variables:
      safe_deadband: "{{ v_deadband | float(300.0) }}"

      # Let op: 'None' is hier vervangen door 'Idle' om de TypeError te voorkomen!
      target_mode: >-
        {% if price_lvl == 'low' and charge_for_trade | bool(false) %}TradeCharge
        {% elif price_lvl == 'low' and charge_for_survival | bool(false) %}SurvCharge
        {% elif should_sell | bool(false) %}TradeDischarge
        {% elif real_demand > safe_deadband and soc > 15 %}HouseDischarge
        {% elif real_demand < (0 - safe_deadband) and soc < 100 %}HouseCharge
        {% else %}Idle{% endif %}

      target_power: >-
        {% if target_mode == 'TradeCharge' %}
          {{ v_max_trade_charge | int(4000) }}
        {% elif target_mode == 'SurvCharge' %}
          {{ v_max_surv_charge | int(2500) }}
        {% elif target_mode == 'TradeDischarge' %}
          {{ v_max_trade_discharge | int(4000) }}
        {% elif target_mode == 'HouseDischarge' %}
          {{ [real_demand | abs | int(0), (v_max_house_discharge | int(6000))] | min }}
        {% elif target_mode == 'HouseCharge' %}
          {{ [real_demand | abs | int(0), (v_max_house_charge | int(8000))] | min }}
        {% else %}
          0
        {% endif %}

      # Veilig met | string cast en 'Idle' controle
      execution_mode: >-
        {% set tm = target_mode | string %}
        {% if 'Charge' in tm %}Charge
        {% elif 'Discharge' in tm %}Discharge
        {% else %}Idle{% endif %}

  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] Demand={{ real_demand | round(0) }}W. Target SOC={{ dynamic_target_soc | round(0) }}%. 
        Tekort: Surv={{ net_charge_needed_kwh | float(0.0) | round(2) }}kWh, Handel={{ trade_charge_needed_kwh | float(0.0) | round(2) }}kWh.
        Mode={{ target_mode }}, Power={{ target_power }}W.

  - choose:
      - conditions: "{{ execution_mode == 'Charge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_charge_power }
            data: { value: "{{ target_power | int(0) }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Charge" }
            
      - conditions: "{{ execution_mode == 'Discharge' }}"
        sequence:
          - service: number.set_value
            target: { entity_id: !input number_discharge_power }
            data: { value: "{{ target_power | int(0) }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "Solis RC Force Battery Discharge" }
            
    default:
      - service: select.select_option
        target: { entity_id: !input select_force_mode }
        data: { option: "None" }

mode: single

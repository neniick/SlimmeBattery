blueprint:
  name: "Geavanceerde HVAC Klimaatregeling V2"
  description: "Volledig autonoom systeem met multi-device aanwezigheid, tijdsvakken, Eco-offsets en hardware protectie."
  domain: automation
  input:
    # --- ENTITEITEN ---
    climate_entity:
      name: "Airco Unit"
      selector: { entity: { domain: climate } }
    room_sensor:
      name: "Ruimte Temperatuur (Kies je Matter sensor)"
      selector: { entity: { domain: sensor, device_class: temperature } }
    outside_sensor:
      name: "Buiten Temperatuur"
      selector: { entity: { domain: sensor, device_class: temperature } }
    door_sensor:
      name: "Deursensor"
      selector: { entity: { domain: binary_sensor } }
    presence_sensors:
      name: "Aanwezigheid (Selecteer 1 of meerdere telefoons)"
      description: "Bijv. de TP-Link trackers. Je bent 'thuis' zodra 1 apparaat in deze lijst 'home' of 'on' is."
      selector: 
        entity: 
          domain: [device_tracker, binary_sensor]
          multiple: true
    heatwave_sensor:
      name: "Hittegolf Verwachting (Voor pre-cool)"
      selector: { entity: { domain: binary_sensor } }

    # --- TEMPERATUUR INSTELLINGEN ---
    base_target:
      name: "Basis Comfort Temperatuur"
      default: 21.0
      selector: { number: { min: 18, max: 26, step: 0.5, unit_of_measurement: "°C" } }
    max_summer_target:
      name: "Maximaal toegestane binnentemperatuur (Zomercurve limiet)"
      default: 25.0
      selector: { number: { min: 22, max: 30, step: 0.5, unit_of_measurement: "°C" } }
    hysterese:
      name: "Normale Marge (Hysterese)"
      description: "Voorkomt continu aan/uit slaan. 0.5 = koelen bij +0.5 en verwarmen bij -0.5 t.o.v. je doel."
      default: 0.5
      selector: { number: { min: 0.1, max: 2.0, step: 0.1, unit_of_measurement: "°C" } }
    eco_offset:
      name: "Brede Marge (Eco Offset)"
      description: "Hoeveel graden mag het afwijken als niemand thuis is (of overdag op een slaapkamer)?"
      default: 2.0
      selector: { number: { min: 0, max: 5, step: 0.5, unit_of_measurement: "°C" } }
    
    # --- TIJDSVAK & MODUS INSTELLINGEN ---
    apply_eco_during_day:
      name: "Gebruik Brede Marge tijdens de Dag (Voor slaapkamers)"
      description: "AAN voor boven, UIT voor woonkamer. Negeert overdag aanwezigheid en hanteert de eco-stand."
      default: false
      selector: { boolean: {} }
    time_day:
      name: "Start Dag (Start Eco voor slaapkamers)"
      default: "08:00:00"
      selector: { time: {} }
    time_evening:
      name: "Start Avond (Start Comfort voor slapen)"
      default: "18:00:00"
      selector: { time: {} }
    time_night:
      name: "Start Nacht (Systeem uit, enkel veiligheid)"
      default: "23:00:00"
      selector: { time: {} }
      
    # --- NACHT VEILIGHEID ---
    night_hot_limit:
      name: "Nacht: Max temp (Extreme hitte beveiliging)"
      default: 27.0
      selector: { number: { min: 22, max: 30, step: 0.5, unit_of_measurement: "°C" } }
    night_cold_limit:
      name: "Nacht: Min temp (Vorst/Kou beveiliging)"
      default: 15.0
      selector: { number: { min: 10, max: 20, step: 0.5, unit_of_measurement: "°C" } }

    # --- FUNCTIES & HARDWARE PROTECTIE ---
    enable_precool:
      name: "Sta Pre-cool toe bij hittegolf (S'nachts doorkoelen)"
      default: false
      selector: { boolean: {} }
    door_delay:
      name: "Deur Vertraging (minuten)"
      default: 2
      selector: { number: { min: 0, max: 10, step: 1 } }
    compressor_delay:
      name: "Anti-Short Cycle (minuten rust voor compressor)"
      default: 15
      selector: { number: { min: 5, max: 60, step: 1 } }
    fan_runon_delay:
      name: "Anti-Schimmel Naloop (minuten Fan-only na koelen)"
      default: 15
      selector: { number: { min: 0, max: 30, step: 1 } }

mode: restart

variables:
  # Input variables
  room_sensor: !input room_sensor
  outside_sensor: !input outside_sensor
  presence_entities: !input presence_sensors
  door_sensor: !input door_sensor
  heatwave_sensor: !input heatwave_sensor
  climate_entity: !input climate_entity
  base_target: !input base_target
  max_summer: !input max_summer_target
  hysterese_var: !input hysterese
  eco_offset: !input eco_offset
  night_hot: !input night_hot_limit
  night_cold: !input night_cold_limit
  precool_enabled: !input enable_precool
  compressor_delay_sec: '{{ ( !input compressor_delay ) * 60 }}'
  apply_eco_day: !input apply_eco_during_day

  # State variables
  room_temp: '{{ states(room_sensor) | float(21) }}'
  outside_temp: '{{ states(outside_sensor) | float(21) }}'
  is_present: "{{ expand(presence_entities) | selectattr('state', 'in', ['home', 'on']) | list | length > 0 }}"
  door_open: '{{ states(door_sensor) == "on" }}'
  is_heatwave: '{{ states(heatwave_sensor) == "on" }}'
  
  # Tijd logica
  current_time: '{{ now().strftime("%H:%M:%S") }}'
  is_night: '{{ current_time >= !input time_night or current_time < !input time_day }}'
  is_evening: '{{ current_time >= !input time_evening and current_time < !input time_night }}'
  is_day: '{{ current_time >= !input time_day and current_time < !input time_evening }}'

  # 1. Basis Comfort Berekening (Zomer/Winter curve)
  calculated_target_comfort: >
    {% if outside_temp > 22 %}
      {% set temp = outside_temp - 6 %}
      {{ [base_target, [temp, max_summer]|min]|max | float }}
    {% elif outside_temp < 5 %}
      {{ base_target + 0.5 | float }}
    {% else %}
      {{ base_target | float }}
    {% endif %}

  # 2. Toevoegen van de Brede Marge (Eco-Offset)
  final_target: >
    {% set use_eco = (not is_present) or (apply_eco_day and is_day) %}
    {% if use_eco %}
      {% if outside_temp > 22 %}
        {{ calculated_target_comfort + eco_offset }}
      {% else %}
        {{ calculated_target_comfort - eco_offset }}
      {% endif %}
    {% else %}
      {{ calculated_target_comfort }}
    {% endif %}

  # Verschil voor ventilatorsnelheid
  temp_diff: '{{ (room_temp - final_target) | abs }}'

trigger:
  - platform: state
    entity_id: !input room_sensor
  - platform: state
    entity_id: !input outside_sensor
  - platform: state
    entity_id: !input presence_sensors
  - platform: state
    entity_id: !input door_sensor
    for:
      minutes: !input door_delay
  - platform: time
    at: !input time_day
  - platform: time
    at: !input time_evening
  - platform: time
    at: !input time_night

condition:
  - condition: template
    value_template: >
      {{ (now() - states[climate_entity].last_changed).total_seconds() > compressor_delay_sec 
         or states(climate_entity) == 'off' }}

action:
  - choose:
      # 1. DEUR OPEN
      - conditions:
          - condition: template
            value_template: '{{ door_open }}'
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input climate_entity
                    state: "cool"
                sequence:
                  - action: climate.set_hvac_mode
                    target: { entity_id: !input climate_entity }
                    data: { hvac_mode: fan_only }
                  - delay:
                      minutes: !input fan_runon_delay
          - action: climate.turn_off
            target: { entity_id: !input climate_entity }

      # 2. NACHT MODUS
      - conditions:
          - condition: template
            value_template: '{{ is_night and not door_open }}'
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ precool_enabled and is_heatwave and room_temp > 19 }}'
                sequence:
                  - action: climate.set_temperature
                    target: { entity_id: !input climate_entity }
                    data: { temperature: 19, hvac_mode: cool }
              
              - conditions:
                  - condition: template
                    value_template: '{{ room_temp > night_hot }}'
                sequence:
                  - action: climate.set_temperature
                    target: { entity_id: !input climate_entity }
                    data: { temperature: night_hot, hvac_mode: cool }
              
              - conditions:
                  - condition: template
                    value_template: '{{ room_temp < night_cold }}'
                sequence:
                  - action: climate.set_temperature
                    target: { entity_id: !input climate_entity }
                    data: { temperature: night_cold, hvac_mode: heat }
            
            default:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input climate_entity
                        state: "cool"
                    sequence:
                      - action: climate.set_hvac_mode
                        target: { entity_id: !input climate_entity }
                        data: { hvac_mode: fan_only }
                      - delay:
                          minutes: !input fan_runon_delay
              - action: climate.turn_off
                target: { entity_id: !input climate_entity }

      # 3. DAG / AVOND MODUS
      - conditions:
          - condition: template
            value_template: '{{ not is_night and not door_open }}'
        sequence:
          - choose:
              # KOELEN
              - conditions:
                  - condition: template
                    value_template: '{{ room_temp > (final_target + hysterese_var) and outside_temp > room_temp }}'
                sequence:
                  - action: climate.set_temperature
                    target: { entity_id: !input climate_entity }
                    data: { temperature: '{{ final_target }}', hvac_mode: cool }
                  - action: climate.set_fan_mode
                    target: { entity_id: !input climate_entity }
                    data:
                      fan_mode: '{{ "high" if temp_diff > 2 else ("medium" if temp_diff > 1 else "low") }}'

              # VERWARMEN
              - conditions:
                  - condition: template
                    value_template: '{{ room_temp < (final_target - hysterese_var) }}'
                sequence:
                  - action: climate.set_temperature
                    target: { entity_id: !input climate_entity }
                    data: { temperature: '{{ final_target }}', hvac_mode: heat }
                  - action: climate.set_fan_mode
                    target: { entity_id: !input climate_entity }
                    data:
                      fan_mode: '{{ "high" if temp_diff > 2 else ("medium" if temp_diff > 1 else "low") }}'

              # OP TEMPERATUUR (UIT)
              - conditions:
                  - condition: template
                    value_template: '{{ room_temp >= (final_target - hysterese_var) and room_temp <= (final_target + hysterese_var) }}'
                sequence:
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: !input climate_entity
                            state: "cool"
                        sequence:
                          - action: climate.set_hvac_mode
                            target: { entity_id: !input climate_entity }
                            data: { hvac_mode: fan_only }
                          - delay:
                              minutes: !input fan_runon_delay
                  - action: climate.turn_off
                    target: { entity_id: !input climate_entity }

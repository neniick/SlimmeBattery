blueprint:
  name: Nul op de Meter + Slim Tarief (Volledig Instelbaar) - Solis Thuisbatterij
  description: >
    Houdt het netverbruik op 0 W. Laadt en ontlaadt geforceerd op basis van stroomprijzen én kijkt vooruit in losse forecast-sensoren.
    
    - Instelbare uitvoer-frequentie.
    - Marge-check: controleert de winstmarge voor opladen.
    - Bugfix: Template parsing errors opgelost en boolean-fixes toegepast.
  domain: automation

  input:
    # ---- Snelheid ----
    update_interval:
      name: "Uitvoer-frequentie"
      description: "Hoe vaak moet de automatisering het verbruik controleren en de omvormer aansturen?"
      default: "/20"
      selector:
        select:
          options:
            - label: "Elke 5 seconden (Agressief, kans op jojo-effect!)"
              value: "/5"
            - label: "Elke 10 seconden (Snel)"
              value: "/10"
            - label: "Elke 15 seconden"
              value: "/15"
            - label: "Elke 20 seconden (Aanbevolen & Stabiel)"
              value: "/20"
            - label: "Elke 30 seconden (Rustig)"
              value: "/30"

    # ---- Sensors (verplicht) ----
    sensor_soc:
      name: "Batterij SOC (%)"
      default: sensor.thuisbatterij_percentage
      selector: { entity: { domain: sensor } }

    sensor_house_power:
      name: "Net-/huisvermogenssensor (W)"
      description: "Positief = afname, negatief = export. Waarde in Watt."
      default: sensor.stroomverbruik
      selector: { entity: { domain: sensor } }

    # ---- Dynamische Prijzen & Forecast (optioneel) ----
    sensor_price_level:
      name: "Zonneplan Prijsniveau Sensor (Status)"
      description: "Sensor die 'high', 'normal' of 'low' teruggeeft."
      default: ""
      selector: { entity: { domain: sensor } }

    sensor_price_value:
      name: "Zonneplan Actuele Prijs Sensor (Numeriek)"
      description: "Sensor met de huidige prijs. Dit is de prijs die vergeleken wordt met de voorspellingen."
      default: ""
      selector: { entity: { domain: sensor } }

    forecast_sensor_prefix:
      name: "Prefix Forecast Sensoren"
      description: "Het gedeelte van de voorspelling-sensoren vóór het cijfer. Standaard 'sensor.zonneplan_forcast_tariff_'."
      default: "sensor.zonneplan_forcast_tariff_"
      selector:
        text: {}

    forecast_lookahead_hours:
      name: "Voorspelling: Hoeveel uur vooruit kijken?"
      default: 8
      selector:
        number: {min: 1, max: 24, step: 1, unit_of_measurement: "uur", mode: slider}
        
    price_charge_min_difference:
      name: "Prijsverschil: Minimaal verschil voor opladen (€)"
      description: "De actuele prijs moet minimaal dit bedrag (bijv. 0.10) lager zijn dan de hoogste prijs in de komende uren."
      default: 0.10
      selector:
        number: {min: 0.00, max: 0.50, step: 0.01, unit_of_measurement: "€", mode: slider}

    price_override_soc_min:
      name: "Prijs: Minimale SOC bij 'high' (%)"
      default: 20
      selector:
        number: {min: 0, max: 100, step: 5, unit_of_measurement: "%", mode: slider}

    price_override_soc_max:
      name: "Prijs: Maximale SOC bij 'low' (%)"
      default: 100
      selector:
        number: {min: 0, max: 100, step: 5, unit_of_measurement: "%", mode: slider}

    price_override_charge_power:
      name: "Prijs: Laadvermogen bij 'low' (W)"
      default: 4000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    price_override_discharge_power:
      name: "Prijs: Ontlaadvermogen bij 'high' (W)"
      default: 4000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    # ---- Actuators (verplicht) ----
    select_force_mode:
      name: "Solis RC Force Charge/Discharge selector"
      default: select.rc_force_charge_discharge
      selector: { entity: { domain: select } }

    number_charge_power:
      name: "Max charge power actuator (W)"
      default: number.thuisbatterij_max_charge_power
      selector: { entity: { domain: number } }

    number_discharge_power:
      name: "Max discharge power actuator (W)"
      default: number.thuisbatterij_max_discharge_power
      selector: { entity: { domain: number } }

    # ---- Nul op de meter drempel ----
    grid_deadband_w:
      name: "Nul-op-de-meter bandbreedte (W)"
      default: 300
      selector:
        number: {min: 50, max: 1000, step: 50, unit_of_measurement: "W", mode: slider}

    soc_hard_min:
      name: "Harde SOC-ondergrens Nul-op-de-meter (%)"
      default: 10
      selector:
        number: {min: 0, max: 50, step: 5, unit_of_measurement: "%", mode: slider}

    max_charge_power:
      name: "Max laadvermogen Nul-op-de-meter (W)"
      default: 8000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    max_discharge_power:
      name: "Max ontlaadvermogen Nul-op-de-meter (W)"
      default: 6000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

variables:
  v_soc: !input sensor_soc
  v_house_pwr: !input sensor_house_power
  
  v_price_level: !input sensor_price_level
  v_price_sensor: !input sensor_price_value
  v_forecast_prefix: !input forecast_sensor_prefix
  v_lookahead_hours: !input forecast_lookahead_hours
  v_price_charge_diff: !input price_charge_min_difference

  v_price_soc_min: !input price_override_soc_min
  v_price_soc_max: !input price_override_soc_max
  v_price_charge_pwr: !input price_override_charge_power
  v_price_discharge_pwr: !input price_override_discharge_power

  v_select_force: !input select_force_mode
  v_num_charge: !input number_charge_power
  v_num_discharge: !input number_discharge_power

  v_deadband: !input grid_deadband_w
  v_soc_min: !input soc_hard_min
  v_max_charge: !input max_charge_power
  v_max_discharge: !input max_discharge_power

  mode_none: "None"
  mode_charge: "Solis RC Force Battery Charge"
  mode_discharge: "Solis RC Force Battery Discharge"

trigger:
  - platform: time_pattern
    seconds: !input update_interval

condition: []

action:
  - variables:
      soc: "{{ states(v_soc) | float(0) }}"
      cur_mode: "{{ states(v_select_force) }}"
      cur_charge: "{{ states(v_num_charge) | float(0) }}"
      cur_discharge: "{{ states(v_num_discharge) | float(0) }}"
      
      current_price: >-
        {% if v_price_sensor in ['', 'none'] or states(v_price_sensor) in ['unknown', 'unavailable', ''] %}
          0
        {% else %}
          {{ states(v_price_sensor) | float(0) }}
        {% endif %}
      
      price_state: >-
        {% if v_price_level in ['', 'none'] or not states(v_price_level) %}
          normal
        {% else %}
          {{ states(v_price_level) | lower }}
        {% endif %}

      grid_w: >-
        {% set p = states(v_house_pwr) | float(0) %}
        {% set unit = state_attr(v_house_pwr, 'unit_of_measurement') | default('', true) | lower %}
        {% if unit == 'kw' %}
          {{ p * 1000 }}
        {% else %}
          {{ p }}
        {% endif %}

      price_analysis: >-
        {% if v_price_sensor in ['', 'none'] or current_price == 0 %}
          true,true,0,0
        {% else %}
          {% set cp = current_price | float(0) %}
          {% set lookahead = v_lookahead_hours | int(8) %}
          {% set min_diff = v_price_charge_diff | float(0.10) %}
          {% set ns = namespace(prices=[]) %}
          
          {% for i in range(1, lookahead + 1) %}
            {% set f_entity = v_forecast_prefix ~ i %}
            {% set f_state = states(f_entity) %}
            {% if f_state not in ['unknown', 'unavailable', 'none', ''] %}
              {% set p = f_state | float(none) %}
              {% if p != none %}
                {% set ns.prices = ns.prices + [p] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          
          {% set min_f = ns.prices | min if ns.prices else cp %}
          {% set max_f = ns.prices | max if ns.prices else cp %}
          
          {% set is_best_c = 'true' if (cp <= min_f) and ((max_f - cp) >= min_diff) else 'false' %}
          {% set is_best_d = 'true' if cp >= max_f else 'false' %}
          
          {{ is_best_c }},{{ is_best_d }},{{ min_f }},{{ max_f }}
        {% endif %}
        
      is_best_charge: "{{ (price_analysis.split(',')[0] | trim) == 'true' }}"
      is_best_discharge: "{{ (price_analysis.split(',')[1] | trim) == 'true' }}"
      min_future_price: "{{ price_analysis.split(',')[2] | trim | float(0) }}"
      max_future_price: "{{ price_analysis.split(',')[3] | trim | float(0) }}"

  - variables:
      real_demand: >-
        {% set g = grid_w | float(0) %}
        {% set cd = cur_discharge | float(0) if cur_mode == mode_discharge else 0 %}
        {% set cc = cur_charge | float(0) if cur_mode == mode_charge else 0 %}
        {{ g + cd - cc }}

      target_mode: >-
        {% set rd = real_demand | float(0) %}
        {% set deadband = v_deadband | float(300) %}
        {% set soc_min = v_soc_min | float(10) %}
        {% set p_soc_min = v_price_soc_min | float(20) %}
        {% set p_soc_max = v_price_soc_max | float(100) %}
        {% set best_c = is_best_charge | bool(false) %}
        {% set best_d = is_best_discharge | bool(false) %}

        {% if price_state == 'low' and best_c and soc < p_soc_max %}
          {{ mode_charge }}
        {% elif price_state == 'high' and best_d and soc > p_soc_min %}
          {{ mode_discharge }}
        {% elif rd > deadband and soc > soc_min %}
          {{ mode_discharge }}
        {% elif rd < (0 - deadband) and soc < 100 %}
          {{ mode_charge }}
        {% else %}
          {{ mode_none }}
        {% endif %}

      target_power: >-
        {% set rd = real_demand | float(0) %}
        {% set deadband = v_deadband | float(300) %}
        {% set max_chg = v_max_charge | float(8000) %}
        {% set max_dis = v_max_discharge | float(6000) %}
        {% set soc_min = v_soc_min | float(10) %}
        {% set p_soc_min = v_price_soc_min | float(20) %}
        {% set p_soc_max = v_price_soc_max | float(100) %}
        {% set p_chg_pwr = v_price_charge_pwr | float(4000) %}
        {% set p_dis_pwr = v_price_discharge_pwr | float(4000) %}
        {% set best_c = is_best_charge | bool(false) %}
        {% set best_d = is_best_discharge | bool(false) %}

        {% if price_state == 'low' and best_c and soc < p_soc_max %}
          {{ p_chg_pwr }}
        {% elif price_state == 'high' and best_d and soc > p_soc_min %}
          {{ p_dis_pwr }}
        {% elif rd > deadband and soc > soc_min %}
          {% set power = rd | round(0) | int %}
          {% if power < 0 %}{% set power = 0 %}{% endif %}
          {{ power if power < max_dis else max_dis }}
        {% elif rd < (0 - deadband) and soc < 100 %}
          {% set power = (rd | abs) | round(0) | int %}
          {% if power < 0 %}{% set power = 0 %}{% endif %}
          {{ power if power < max_chg else max_chg }}
        {% else %}
          0
        {% endif %}

  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] prijs={{ price_state }} (cp={{ current_price }}), best_charge={{ is_best_charge }}, best_discharge={{ is_best_discharge }},
        grid={{ grid_w }}W, real_demand={{ real_demand }}W, soc={{ soc }}%, target_mode={{ target_mode }}, target_power={{ target_power }}W

  # ACTIES: Altijd wegschrijven (met de | string bugfix)
  - choose:
      - conditions: >-
          {{ (cur_mode == mode_charge and target_mode == mode_discharge)
             or (cur_mode == mode_discharge and target_mode == mode_charge) }}
        sequence:
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "{{ mode_none | string }}" }
          - delay: { seconds: 2 }
          - choose:
              - conditions: "{{ target_mode == mode_charge }}"
                sequence:
                  - service: number.set_value
                    target: { entity_id: !input number_charge_power }
                    data: { value: "{{ target_power }}" }
              - conditions: "{{ target_mode == mode_discharge }}"
                sequence:
                  - service: number.set_value
                    target: { entity_id: !input number_discharge_power }
                    data: { value: "{{ target_power }}" }
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "{{ target_mode | string }}" }

      - conditions: "{{ target_mode != mode_none }}"
        sequence:
          - choose:
              - conditions: "{{ target_mode == mode_charge }}"
                sequence:
                  - service: number.set_value
                    target: { entity_id: !input number_charge_power }
                    data: { value: "{{ target_power }}" }
              - conditions: "{{ target_mode == mode_discharge }}"
                sequence:
                  - service: number.set_value
                    target: { entity_id: !input number_discharge_power }
                    data: { value: "{{ target_power }}" }
          
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "{{ target_mode | string }}" }

    default:
      - service: select.select_option
        target: { entity_id: !input select_force_mode }
        data: { option: "{{ mode_none | string }}" }

mode: single

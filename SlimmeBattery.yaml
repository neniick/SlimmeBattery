 
blueprint:
  name: Nul op de Meter + Dynamisch Tarief - Solis Thuisbatterij
  description: >
    Houdt het netverbruik op 0 W, maar laadt automatisch op bij lage stroomprijzen en levert terug bij hoge stroomprijzen.

    - Dynamisch: Laadt voluit bij 'low' tarief, ontlaadt voluit bij 'high' tarief.
    - Met instelbare vermogens en SOC-grenzen specifiek voor de prijs-overrides.
    - Nul-op-de-meter: Binnen 'normal' tarief (of als de prijs-SOC grens bereikt is) wordt het netverbruik op 0 W gehouden.
    - Aansturing via Solis RC Force Charge/Discharge selector.
    - Wordt elke 20 seconden uitgevoerd.
  domain: automation

  input:
    # ---- Sensors (verplicht) ----
    sensor_soc:
      name: "Batterij SOC (%)"
      description: "Bijv.: sensor.thuisbatterij_percentage"
      default: sensor.thuisbatterij_percentage
      selector: { entity: { domain: sensor } }

    sensor_house_power:
      name: "Net-/huisvermogenssensor (W/kW)"
      description: "Positief = afname (import), negatief = export (teruglevering). Bijv.: sensor.stroomverbruik"
      default: sensor.stroomverbruik
      selector: { entity: { domain: sensor } }

    # ---- Dynamische Prijzen (optioneel) ----
    sensor_price_level:
      name: "Zonneplan Prijsniveau Sensor"
      description: "Sensor die 'high', 'normal' of 'low' teruggeeft. Laat leeg om alleen de nul-op-de-meter regeling te gebruiken."
      default: ""
      selector: { entity: { domain: sensor } }

    price_override_soc_min:
      name: "Prijs: Minimale SOC bij 'high' (%)"
      description: "Stop met het forceren van terugleveren als de batterij dit percentage bereikt (handig om reserve voor de nacht te houden)."
      default: 20
      selector:
        number: {min: 0, max: 100, step: 5, unit_of_measurement: "%", mode: slider}

    price_override_soc_max:
      name: "Prijs: Maximale SOC bij 'low' (%)"
      description: "Stop met het geforceerd opladen vanaf het net als de batterij dit percentage bereikt."
      default: 100
      selector:
        number: {min: 0, max: 100, step: 5, unit_of_measurement: "%", mode: slider}

    price_override_charge_power:
      name: "Prijs: Laadvermogen bij 'low' (W)"
      description: "Met welk vermogen moet de batterij opladen tijdens goedkope uren?"
      default: 4000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    price_override_discharge_power:
      name: "Prijs: Ontlaadvermogen bij 'high' (W)"
      description: "Met welk vermogen moet de batterij terugleveren aan het net tijdens dure uren?"
      default: 4000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    # ---- Actuators (verplicht) ----
    select_force_mode:
      name: "Solis RC Force Charge/Discharge selector"
      description: "Bijv.: select.rc_force_charge_discharge"
      default: select.rc_force_charge_discharge
      selector: { entity: { domain: select } }

    number_charge_power:
      name: "Max charge power (W)"
      description: "Bijv.: number.thuisbatterij_max_charge_power"
      default: number.thuisbatterij_max_charge_power
      selector: { entity: { domain: number } }

    number_discharge_power:
      name: "Max discharge power (W)"
      description: "Bijv.: number.thuisbatterij_max_discharge_power"
      default: number.thuisbatterij_max_discharge_power
      selector: { entity: { domain: number } }

    # ---- Nul op de meter drempel ----
    grid_deadband_w:
      name: "Nul-op-de-meter bandbreedte (W)"
      description: "Acceptabele afwijking van 0 W. Batterij grijpt in buiten +/- deze waarde."
      default: 300
      selector:
        number: {min: 50, max: 1000, step: 50, unit_of_measurement: "W", mode: slider}

    # ---- SOC grenzen (Nul op de meter) ----
    soc_hard_min:
      name: "Harde SOC-ondergrens Nul-op-de-meter (%)"
      description: "Nooit ontladen voor huisverbruik onder deze SOC. Dit is de absolute ondergrens."
      default: 10
      selector:
        number: {min: 0, max: 50, step: 5, unit_of_measurement: "%", mode: slider}

    # ---- Maximaal vermogen (Nul op de meter) ----
    max_charge_power:
      name: "Max laadvermogen Nul-op-de-meter (W)"
      description: "Bovengrens voor dynamisch laden met zonne-overschot."
      default: 8000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    max_discharge_power:
      name: "Max ontlaadvermogen Nul-op-de-meter (W)"
      description: "Bovengrens voor dynamisch ontladen voor eigen huisverbruik."
      default: 6000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

variables:
  v_soc: !input sensor_soc
  v_house_pwr: !input sensor_house_power
  v_price_level: !input sensor_price_level

  v_price_soc_min: !input price_override_soc_min
  v_price_soc_max: !input price_override_soc_max
  v_price_charge_pwr: !input price_override_charge_power
  v_price_discharge_pwr: !input price_override_discharge_power

  v_select_force: !input select_force_mode
  v_num_charge: !input number_charge_power
  v_num_discharge: !input number_discharge_power

  v_deadband: !input grid_deadband_w
  v_soc_min: !input soc_hard_min
  v_max_charge: !input max_charge_power
  v_max_discharge: !input max_discharge_power

  # Solis mode waarden
  mode_none: "None"
  mode_charge: "Solis RC Force Battery Charge"
  mode_discharge: "Solis RC Force Battery Discharge"

trigger:
  # Vuur de automatisering stipt elke 20 seconden af
  - platform: time_pattern
    seconds: "/20"

condition: []

action:
  # 1) Lees actuele waarden in
  - variables:
      soc: "{{ states(v_soc) | float(0) }}"
      cur_mode: "{{ states(v_select_force) }}"
      cur_charge: "{{ states(v_num_charge) | float(0) }}"
      cur_discharge: "{{ states(v_num_discharge) | float(0) }}"
      
      # Prijsniveau inlezen (als de sensor leeg of onbekend is, beschouw het als 'normal')
      price_state: >-
        {% if v_price_level in ['', 'none'] or not states(v_price_level) %}
          normal
        {% else %}
          {{ states(v_price_level) | lower }}
        {% endif %}

      # Netvermogen in Watt (positief = import, negatief = export)
      grid_w: >-
        {% set raw = states(v_house_pwr) %}
        {% set p = raw | float(0) %}
        {% set unit = (state_attr(v_house_pwr, 'unit_of_measurement') | default('', true) | lower) %}
        {% if unit in ['kw'] %}
          {{ p * 1000 }}
        {% elif (p | abs) < 50 %}
          {{ p * 1000 }}
        {% else %}
          {{ p }}
        {% endif %}

  # 2) Bepaal targets: prijs-override óf nul-op-de-meter
  - variables:
      real_demand: >-
        {% set g = grid_w | float(0) %}
        {% set cd = cur_discharge | float(0) if cur_mode == mode_discharge else 0 %}
        {% set cc = cur_charge | float(0) if cur_mode == mode_charge else 0 %}
        {{ g + cd - cc }}

      target_mode: >-
        {% set rd = real_demand | float(0) %}
        {% set deadband = v_deadband | float(300) %}
        {% set soc_min = v_soc_min | float(10) %}
        
        {% set p_soc_min = v_price_soc_min | float(20) %}
        {% set p_soc_max = v_price_soc_max | float(100) %}

        {% if price_state == 'low' and soc < p_soc_max %}
          {{ mode_charge }}
        {% elif price_state == 'high' and soc > p_soc_min %}
          {{ mode_discharge }}
        {% elif rd > deadband and soc > soc_min %}
          {{ mode_discharge }}
        {% elif rd < (deadband * -1) and soc < 100 %}
          {{ mode_charge }}
        {% else %}
          {{ mode_none }}
        {% endif %}

      target_power: >-
        {% set rd = real_demand | float(0) %}
        {% set deadband = v_deadband | float(300) %}
        {% set max_chg = v_max_charge | float(8000) %}
        {% set max_dis = v_max_discharge | float(6000) %}
        {% set soc_min = v_soc_min | float(10) %}
        
        {% set p_soc_min = v_price_soc_min | float(20) %}
        {% set p_soc_max = v_price_soc_max | float(100) %}
        {% set p_chg_pwr = v_price_charge_pwr | float(4000) %}
        {% set p_dis_pwr = v_price_discharge_pwr | float(4000) %}

        {% if price_state == 'low' and soc < p_soc_max %}
          {{ p_chg_pwr }}
        {% elif price_state == 'high' and soc > p_soc_min %}
          {{ p_dis_pwr }}
        {% elif rd > deadband and soc > soc_min %}
          {{ [[rd | round(0) | int, 0] | max, max_dis] | min }}
        {% elif rd < (deadband * -1) and soc < 100 %}
          {{ [[(rd | abs) | round(0) | int, 0] | max, max_chg] | min }}
        {% else %}
          0
        {% endif %}

  # Debug logging (handig in Logboek om te kijken wat hij besluit te doen)
  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] prijs={{ price_state }}, grid={{ grid_w }}W, real_demand={{ real_demand }}W,
        soc={{ soc }}%, target: mode={{ target_mode }}, power={{ target_power }}W,
        current: mode={{ cur_mode }}, charge={{ cur_charge }}W, discharge={{ cur_discharge }}W

  # 3) Niets gewijzigd? Stoppen zonder service-calls (om API/Modbus rustig te houden)
  - choose:
      - conditions: >-
          {% set tm = target_mode | string %}
          {% set tp = target_power | float(0) %}
          {% if tm == mode_none %}
            {{ cur_mode == mode_none }}
          {% elif tm == mode_charge %}
            {{ cur_mode == mode_charge and cur_charge == tp }}
          {% elif tm == mode_discharge %}
            {{ cur_mode == mode_discharge and cur_discharge == tp }}
          {% else %}
            false
          {% endif %}
        sequence:
          - stop: "Geen wijzigingen nodig."

    default:
      # 4) Zet mode en vermogen (met veilige tussenstap via 'None' bij wisselen van richting)
      - choose:
          # Wisseling van charge <-> discharge
          - conditions: >-
              {{ (cur_mode == mode_charge and target_mode == mode_discharge)
                 or (cur_mode == mode_discharge and target_mode == mode_charge) }}
            sequence:
              - service: select.select_option
                target: { entity_id: !input select_force_mode }
                data: { option: "{{ mode_none }}" }
              - delay: { seconds: 2 }
              - choose:
                  - conditions: "{{ target_mode == mode_charge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_charge_power }
                        data: { value: "{{ target_power }}" }
                  - conditions: "{{ target_mode == mode_discharge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_discharge_power }
                        data: { value: "{{ target_power }}" }
              - service: select.select_option
                target: { entity_id: !input select_force_mode }
                data: { option: "{{ target_mode }}" }

          # Zelfde richting of van/naar None: direct instellen
          - conditions: "{{ target_mode != mode_none }}"
            sequence:
              - choose:
                  - conditions: "{{ target_mode == mode_charge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_charge_power }
                        data: { value: "{{ target_power }}" }
                  - conditions: "{{ target_mode == mode_discharge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_discharge_power }
                        data: { value: "{{ target_power }}" }
              - choose:
                  - conditions: "{{ cur_mode != target_mode }}"
                    sequence:
                      - service: select.select_option
                        target: { entity_id: !input select_force_mode }
                        data: { option: "{{ target_mode }}" }

        # Target is None: zet mode op None
        default:
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "{{ mode_none }}" }

mode: single
